<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rift RPG</title>

<style>
body { font-family: serif; background:#080a0f; color:#ddd; padding:10px; }
h2 { text-align:center; color:gold; }

#hud { border:1px solid #444; padding:8px; margin-bottom:10px; }

.bar { height:10px; background:#222; margin:5px 0; }
.fill { height:100%; }

.life { background:green; }
.will { background:purple; }
.xp { background:gold; }

button {
  width:100%;
  padding:12px;
  margin:5px 0;
  background:#111;
  color:#ddd;
  border:1px solid #444;
}

input { width:100%; padding:10px; }

#story { min-height:200px; white-space:pre-line; }
#journal { font-size:12px; margin-top:10px; color:#aaa; }
</style>
</head>

<body>

<h2>⚔ Rift RPG</h2>

<div id="hud"></div>
<div id="story"></div>
<div id="choices"></div>

<h3>📜 Journal</h3>
<div id="journal"></div>

<script>

// ===== PLAYER =====
let player = {
  life:100, maxLife:100,
  will:100, maxWill:100,
  xp:0, level:1,
  gold:0,
  spells:[],
  quests:[
    {name:"Discover the Rift", stage:0, done:false}
  ]
};

let combat = null;

// ===== HUD =====
function updateHUD(){
  document.getElementById("hud").innerHTML = `
  ❤️ ${player.life}/${player.maxLife}
  <div class="bar"><div class="fill life" style="width:${(player.life/player.maxLife)*100}%"></div></div>

  ✦ ${player.will}/${player.maxWill}
  <div class="bar"><div class="fill will" style="width:${(player.will/player.maxWill)*100}%"></div></div>

  ⭐ XP ${player.xp}/100
  <div class="bar"><div class="fill xp" style="width:${player.xp}%"></div></div>

  🪙 ${player.gold} | Lv ${player.level}

  ${combat ? "<br>⚔ "+combat.name+" ("+combat.hp+" HP)" : ""}
  `;
}

// ===== STORY =====
function addStory(t){
  const el=document.createElement("div");
  document.getElementById("story").appendChild(el);
  let i=0;
  function type(){
    if(i<t.length){ el.innerHTML+=t[i++]; setTimeout(type,10); }
  }
  type();
}

// ===== STORY SYSTEM =====
function generateStory(action){
  const events = [
    "The Rift pulses.",
    "A dark wind howls.",
    "Reality bends around you.",
    "A distant scream echoes."
  ];

  return {
    narrative: events[Math.floor(Math.random()*events.length)] + " You " + action + ".",
    enemy: Math.random()>0.4 ? spawnEnemy() : null
  };
}

// ===== ENEMIES =====
function spawnEnemy(){
  const enemies = [
    {name:"Tsurani Warrior",hp:40,attack:8},
    {name:"Tsurani Brute",hp:60,attack:10},
    {name:"Rift Mage",hp:35,attack:12}
  ];
  return enemies[Math.floor(Math.random()*enemies.length)];
}

// ===== FLOW =====
function handleInput(input){
  addStory("> "+input);

  if(combat) return;

  const d = generateStory(input);

  addStory(d.narrative);

  if(d.enemy){
    startCombat(d.enemy);
  } else {
    renderChoices(["Advance","Search","Rest"]);
  }

  progressQuest();
  updateHUD();
}

// ===== COMBAT =====
function startCombat(enemy){
  combat = {...enemy};
  addStory("⚔ "+enemy.name+" attacks!");
  renderCombat();
  updateHUD();
}

function renderCombat(){
  const area=document.getElementById("choices");
  area.innerHTML="";

  player.spells.forEach(s=>{
    let b=document.createElement("button");
    b.textContent=s.name;
    b.onclick=()=>cast(s);
    area.appendChild(b);
  });

  let atk=document.createElement("button");
  atk.textContent="Attack";
  atk.onclick=attack;
  area.appendChild(atk);
}

function attack(){
  let dmg=Math.floor(Math.random()*10+5);
  if(Math.random()>0.8){ dmg*=2; addStory("💥 Critical hit!"); }

  combat.hp-=dmg;
  addStory("You deal "+dmg);

  checkCombat();
}

function cast(s){
  if(player.will<s.cost){ addStory("Not enough will"); return; }

  player.will-=s.cost;
  combat.hp-=s.damage;

  addStory("✨ "+s.name+" hits for "+s.damage);

  checkCombat();
}

function enemyTurn(){
  player.life-=combat.attack;
  addStory("Enemy hits "+combat.attack);
}

function checkCombat(){
  if(combat.hp<=0){
    addStory("Enemy defeated!");

    player.gold+=10;
    player.xp+=25;

    if(player.xp>=100){
      player.xp=0;
      player.level++;
      unlockSpell();
      addStory("🌟 Level up!");
    }

    combat=null;
    renderChoices(["Continue","Search","Rest"]);

  } else {
    enemyTurn();
    renderCombat();
  }

  updateHUD();
}

// ===== SPELL TREE =====
function unlockSpell(){
  const pool = [
    {name:"Spark",damage:10,cost:5},
    {name:"Flame Burst",damage:20,cost:10},
    {name:"Rift Bolt",damage:30,cost:15}
  ];

  const s = pool[Math.floor(Math.random()*pool.length)];

  if(!player.spells.find(x=>x.name===s.name)){
    player.spells.push(s);
    addStory("🧙 Learned "+s.name);
  }
}

// ===== QUEST SYSTEM =====
function progressQuest(){
  let q = player.quests[0];

  if(q.stage===0){
    q.stage=1;
    addStory("📜 Quest updated: Approach the Rift");
  }
  else if(q.stage===1){
    q.stage=2;
    addStory("📜 Quest updated: Survive the Rift");
  }
  else if(q.stage===2){
    q.done=true;
    addStory("✅ Quest complete!");
  }

  updateJournal();
}

function updateJournal(){
  document.getElementById("journal").innerHTML =
    player.quests.map(q=>q.name + (q.done?" ✅":"")).join("<br>");
}

// ===== SAVE =====
function save(){
  localStorage.setItem("rift",JSON.stringify(player));
}

function load(){
  const s = localStorage.getItem("rift");
  if(s) player = JSON.parse(s);
}
load();
setInterval(save,5000);

// ===== START =====
addStory("You stand before the Rift. It hums with power.");

updateHUD();

renderChoices([
  "Step forward",
  "Study the Rift",
  "Leave"
]);

</script>

</body>
</html>
``
