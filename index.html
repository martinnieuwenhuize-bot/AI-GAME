<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realm of Ash</title>

<style>
body{margin:0;background:#0c0906;color:#e8dcc8;font-family:serif;}
#app{max-width:500px;margin:auto;height:100vh;display:flex;flex-direction:column;}
#title,#game{padding:20px;flex:1;display:flex;flex-direction:column;}
#game{display:none;}
#story{flex:1;overflow-y:auto;}
#choices{max-height:20vh;overflow-y:auto;}
button,input{padding:10px;margin-top:5px;}
button{background:#1a1410;border:1px solid #2e2318;color:white;}
button.selected{border:2px solid gold;}
img{width:100%;margin-bottom:10px;border-radius:6px;}
</style>
</head>

<body>

<div id="app">

<div id="title">
<h1>Realm of Ash</h1>
<input id="name" placeholder="Name">
<input id="appearance" placeholder="Describe yourself">

<h3>Class</h3>
<div id="class-select">
<button onclick="setClass(this,'Fighter')">Fighter</button>
<button onclick="setClass(this,'Rogue')">Rogue</button>
<button onclick="setClass(this,'Mage')">Mage</button>
<button onclick="setClass(this,'Cleric')">Cleric</button>
</div>

<button onclick="start()">Begin</button>
<button onclick="load()">Load</button>
</div>

<div id="game">
<img id="img" style="display:none;">
<div id="story"></div>
<div id="choices"></div>

<input id="input" placeholder="Type anything..." onkeydown="if(event.key==='Enter')act()">
<button onclick="act()">Do it</button>
<button onclick="save()">💾 Save</button>

<div id="stats"></div>
</div>

</div>

<script>

// ---------- PLAYER ----------
let player={
name:"Hero",
class:"Fighter",
appearance:"",
location:"road",
level:1,
xp:0,
factions:{
town:0,
outlaw:0,
ranger:0
}
};

// ---------- QUESTS ----------
let quests={
beast:{started:false,completed:false,path:null},
bandit:{started:false,completed:false,path:null}
};

// ---------- NPC ----------
let npcs={
Borin:{memory:[],faction:"town"},
Hunter:{memory:[],faction:"ranger"},
Bandit:{memory:[],faction:"outlaw"}
};

let log=[];
let enemy=null;

// ---------- UI ----------
function narrate(t){
log.push(t);
let d=document.createElement("div");
d.textContent=t;
story.appendChild(d);
story.scrollTop=story.scrollHeight;
}

function showImg(){
img.style.display="block";
img.src=`https://image.pollinations.ai/prompt/${player.location} fantasy?seed=${Date.now()}`;
}

// ---------- START ----------
function setClass(btn,c){
player.class=c;
document.querySelectorAll("#class-select button")
.forEach(b=>b.classList.remove("selected"));
btn.classList.add("selected");
}

function start(){
player.name=name.value||"Hero";
player.appearance=appearance.value||"unknown";

title.style.display="none";
game.style.display="flex";

showImg();
narrate(`You are ${player.name}, a ${player.class}, ${player.appearance}.`);

showChoices(["look around","move"]);
updateStats();
}

// ---------- ACTION ----------
function act(){
let t=input.value.trim();
if(!t) return;
input.value="";
process(t);
}

function process(action){

narrate("> "+action);

if(enemy){combat(action); return;}

handleMovement(action);
handleNPC(action);
handleQuests(action);
updateWorld();

narrate(describe(action));

showChoices(getChoices());
updateStats();
}

// ---------- MOVEMENT ----------
let locations={
road:{desc:"a dusty road",exits:["town","forest"]},
town:{desc:"a guarded town",exits:["road","tavern"]},
tavern:{desc:"a lively tavern",npc:"Borin"},
forest:{desc:"a shadowy forest",npc:"Hunter"}
};

function handleMovement(a){
a=a.toLowerCase();

let exits=locations[player.location].exits||[];
exits.forEach(dest=>{
if(a.includes(dest)){
player.location=dest;
showImg();
}
});
}

// ---------- NPC ----------
function handleNPC(a){
let loc=locations[player.location];
if(!loc.npc) return;

let npc=npcs[loc.npc];

if(a.includes("talk")){
let mem=npc.memory.join(", ")||"nothing";
narrate(`${loc.npc} eyes you carefully. They remember: ${mem}`);
}

if(a.includes("attack")){
npc.memory.push("attacked you");
startCombat(loc.npc);
}

if(a.includes("help")){
npc.memory.push("you helped them");
player.factions[npc.faction]++;
}
}

// ---------- QUESTS ----------
function handleQuests(a){

// Beast quest
if(player.location==="tavern" && a.includes("talk") && !quests.beast.started){
quests.beast.started=true;
narrate("Borin asks you to deal with the beast in the forest.");
}

if(player.location==="forest" && quests.beast.started && !quests.beast.completed){

if(a.includes("kill beast")){
quests.beast.completed=true;
quests.beast.path="kill";
player.factions.town++;

narrate("You kill the beast violently.");
}

if(a.includes("spare beast")){
quests.beast.completed=true;
quests.beast.path="spare";
player.factions.ranger++;

narrate("You spare the beast.");
}

}

// Bandit quest
if(player.location==="road" && a.includes("investigate") && !quests.bandit.started){
quests.bandit.started=true;
narrate("You discover bandit activity nearby.");
}

if(a.includes("join bandits")){
quests.bandit.completed=true;
quests.bandit.path="join";
player.factions.outlaw++;
narrate("You side with the bandits.");
}

if(a.includes("fight bandits")){
quests.bandit.completed=true;
quests.bandit.path="fight";
player.factions.town++;
narrate("You defeat the bandits.");
}

}

// ---------- WORLD REACTION ----------
function updateWorld(){

if(player.factions.town>2){
locations.town.desc="a welcoming town where guards trust you";
}

if(player.factions.outlaw>2){
narrate("Word spreads… outlaws recognise you as one of their own.");
}

}

// ---------- COMBAT ----------
function startCombat(name){
enemy={name:name,hp:30};
narrate(`⚔ ${name} attacks!`);
}

function combat(a){

if(a.includes("attack")){
enemy.hp-=10;
narrate("You strike.");
}

if(enemy.hp<=0){
narrate(`${enemy.name} defeated`);
enemy=null;
player.xp+=10;
levelUp();
}
}

// ---------- LEVEL ----------
function levelUp(){
if(player.xp>=player.level*20){
player.level++;
narrate("🔥 Level up");
}
}

// ---------- STORY ----------
function describe(a){
let loc=locations[player.location];
return `You ${a}. You are in ${loc.desc}.`;
}

// ---------- CHOICES ----------
function getChoices(){

if(enemy) return ["attack","run"];

let loc=locations[player.location];

let base=["look","move"];

if(loc.npc) base.push("talk");

if(player.location==="forest" && quests.beast.started && !quests.beast.completed){
base.push("kill beast","spare beast");
}

if(!quests.bandit.started) base.push("investigate");

return base;
}

function showChoices(arr){
choices.innerHTML="";
arr.forEach(c=>{
let b=document.createElement("button");
b.textContent=c;
b.onclick=()=>process(c);
choices.appendChild(b);
});
}

// ---------- STATS ----------
function updateStats(){
stats.textContent=
`LVL:${player.level} XP:${player.xp} | Town:${player.factions.town} Outlaw:${player.factions.outlaw} Ranger:${player.factions.ranger}`;
}

// ---------- SAVE ----------
function save(){
localStorage.setItem("save",JSON.stringify({player,quests,npcs,locations,log}));
alert("Saved");
}

// ---------- LOAD ----------
function load(){
let s=localStorage.getItem("save");
if(!s) return alert("No save");

let d=JSON.parse(s);
player=d.player;
quests=d.quests;
npcs=d.npcs;
locations=d.locations;
log=d.log;

title.style.display="none";
game.style.display="flex";

story.innerHTML="";
log.forEach(t=>{
let el=document.createElement("div");
el.textContent=t;
story.appendChild(el);
});

showImg();
updateStats();
showChoices(["continue"]);
}

</script>
</body>
</html>
``
