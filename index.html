<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Rift RPG Ultimate+</title>

<style>
body{
  background:#07090f;
  color:#ddd;
  font-family:serif;
  margin:0;
  padding:10px;
}

h2{text-align:center;color:#eccc68;}

#hud{border-bottom:1px solid #333;padding-bottom:10px;}

.bar{height:8px;background:#111;margin:5px 0;}
.fill{height:100%;transition:.4s;}

.life{background:#2ed573;}
.will{background:#a55eea;}
.xp{background:#ffa502;}

.choice{
  width:100%;
  padding:12px;
  margin:5px 0;
  background:#121520;
  color:#ccc;
  border:1px solid #333;
}

.glow{
  box-shadow:0 0 12px #a55eea;
}

#story div{opacity:0;transition:.5s;}

#inventory{
  position:fixed;
  inset:0;
  background:#000d;
  display:none;
  justify-content:center;
  align-items:center;
}

.inv-box{
  background:#111;
  padding:15px;
  width:90%;
  max-width:300px;
}

#map button{margin-top:5px;}
</style>
</head>

<body>

<h2>⚔ Rift RPG</h2>

<div id="hud"></div>
<div id="story"></div>
<div id="choices"></div>
<div id="map"></div>

<button onclick="toggleInventory()">📦 Inventory</button>

<div id="inventory">
  <div class="inv-box">
    <h3>Inventory</h3>
    <div id="inv-list"></div>
    <button onclick="toggleInventory()">Close</button>
  </div>
</div>

<script>

// ===== PLAYER =====
let player={
  life:100,maxLife:100,
  will:100,maxWill:100,
  xp:0,level:1,gold:0,
  location:"Rift Edge",
  spells:[{name:"Spark",d:10,c:5}],
  inventory:["Old Cloak"]
};

let combat=null;

// ===== HUD =====
function hud(){
  document.getElementById("hud").innerHTML=\`
❤️ \${player.life}
<div class="bar"><div class="fill life" style="width:\${player.life}%"></div></div>

✦ \${player.will}
<div class="bar"><div class="fill will" style="width:\${player.will}%"></div></div>

⭐ \${player.xp}/100
<div class="bar"><div class="fill xp" style="width:\${player.xp}%"></div></div>

🪙 \${player.gold} | Lv \${player.level} | 📍 \${player.location}
\`;
}

// ===== STORY =====
function story(t){
  let d=document.createElement("div");
  d.textContent=t;
  document.getElementById("story").appendChild(d);
  setTimeout(()=>d.style.opacity=1,10);
}

// ===== INVENTORY =====
function toggleInventory(){
  const inv=document.getElementById("inventory");
  inv.style.display=inv.style.display==="flex"?"none":"flex";

  document.getElementById("inv-list").innerHTML=
    player.inventory.map(i=>"• "+i).join("<br>");
}

// ===== MAP =====
function showMap(){
  if(combat) return;

  document.getElementById("map").innerHTML=\`
  <button class="choice" onclick="travel('Rift Edge')">Rift Edge</button>
  <button class="choice" onclick="travel('War Camp')">War Camp</button>
  <button class="choice" onclick="travel('Ruins')">Ruins</button>
  <button class="choice" onclick="travel('Forest')">Shadow Forest</button>
  <button class="choice" onclick="travel('City')">Broken City</button>
  \`;
}

// ===== TRAVEL =====
function travel(loc){
  player.location=loc;
  story("You travel to "+loc);

  if(Math.random()>0.6){
    npcEncounter();
  } else if(Math.random()>0.5){
    startCombat();
  } else {
    renderChoices(["Search","Rest"]);
  }

  hud();
}

// ===== NPC =====
function npcEncounter(){
  story("You encounter a mysterious figure...");

  renderChoices([
    "Talk",
    "Ignore"
  ]);
}

function npcTalk(){
  story("NPC: The Rift grows unstable...");

  if(Math.random()>0.5){
    player.inventory.push("Strange Relic");
    story("You received a relic!");
  }

  renderChoices(["Continue"]);
}

// ===== COMBAT =====
function startCombat(){
  let enemies=[
    {name:"Warrior",hp:40,atk:8},
    {name:"Mage",hp:30,atk:10}
  ];
  combat=enemies[Math.floor(Math.random()*enemies.length)];

  story("⚔ "+combat.name+" appears!");
  renderCombat();
}

function renderCombat(){
  let c=document.getElementById("choices");
  c.innerHTML="";

  player.spells.forEach(s=>{
    let b=document.createElement("button");
    b.className="choice";
    b.textContent=s.name;
    b.onclick=()=>cast(s);
    c.appendChild(b);
  });

  let atk=document.createElement("button");
  atk.className="choice";
  atk.textContent="Attack";
  atk.onclick=attack;
  c.appendChild(atk);
}

function attack(){
  let dmg=Math.floor(Math.random()*10+5);
  combat.hp-=dmg;
  story("You hit "+dmg);
  checkCombat();
}

function cast(s){
  if(player.will<s.c){story("No will!");return;}
  player.will-=s.c;
  combat.hp-=s.d;
  story("Spell hits "+s.d);
  checkCombat();
}

function enemyTurn(){
  player.life-=combat.atk;
  story("Enemy hits "+combat.atk);
}

function checkCombat(){
  if(combat.hp<=0){
    story("Enemy defeated!");
    player.gold+=10;
    player.inventory.push("Loot");
    combat=null;
    showMap();
  } else {
    enemyTurn();
    renderCombat();
  }

  hud();
}

// ===== ACTIONS =====
function renderChoices(arr){
  let c=document.getElementById("choices");
  c.innerHTML="";

  arr.forEach(a=>{
    let b=document.createElement("button");
    b.className="choice";
    b.textContent=a;
    b.onclick=()=>action(a);
    c.appendChild(b);
  });
}

function action(a){
  if(a==="Search"){
    if(Math.random()>0.5){
      player.gold+=5;
      player.inventory.push("Herbs");
      story("You found something useful.");
    } else story("Nothing found.");
  }

  if(a==="Rest"){
    player.life+=10;
    player.will+=10;
    story("You recover.");
  }

  if(a==="Talk") npcTalk();

  hud();
}

// ===== START =====
story("You stand before the Rift.");
hud();
showMap();

</script>

</body>
</html>
