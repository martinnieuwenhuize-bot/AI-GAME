<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rift RPG – Stable Build</title>

<style>
body {
  background:#07090f;
  color:#ddd;
  font-family:serif;
  margin:0;
  padding:10px;
}

h2 { text-align:center; color:#eccc68; }

.choice {
  width:100%;
  padding:12px;
  margin:6px 0;
  background:#121520;
  border:1px solid #333;
  color:#ddd;
}

.glow {
  box-shadow:0 0 15px #a55eea;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0%{box-shadow:0 0 5px #a55eea}
  50%{box-shadow:0 0 20px #a55eea}
  100%{box-shadow:0 0 5px #a55eea}
}

#story div { opacity:0; transition:.4s; }

#inventory {
  position:fixed;
  inset:0;
  background:#000d;
  display:none; /* ✅ START CLOSED */
  justify-content:center;
  align-items:center;
}

.inv-box {
  background:#111;
  padding:15px;
  width:90%;
  max-width:320px;
}
</style>
</head>

<body>

<h2>⚔ Rift RPG</h2>

<div id="story"></div>
<div id="choices"></div>
<div id="map"></div>

<button class="choice" onclick="toggleInventory()">📦 Inventory</button>

<div id="inventory">
  <div class="inv-box">
    <h3>Inventory</h3>
    <div id="invList"></div>
    <button class="choice" onclick="toggleInventory()">Close</button>
  </div>
</div>

<script>
// ===== PLAYER =====
let player = {
  life:100,
  will:100,
  gold:0,
  location:"Rift Edge",
  inventory:["Old Cloak"]
};

let combat = false;

// ===== STORY =====
function story(text){
  let d=document.createElement("div");
  d.textContent=text;
  document.getElementById("story").appendChild(d);
  setTimeout(()=>d.style.opacity=1,10);
}

// ===== INVENTORY =====
function toggleInventory(){
  const inv=document.getElementById("inventory");
  inv.style.display = inv.style.display==="flex" ? "none" : "flex";
  renderInventory();
}

function renderInventory(){
  document.getElementById("invList").innerHTML =
    player.inventory.map(i=>"• "+i).join("<br>") || "Empty";
}

// ===== START FLOW =====
function startIntro(){
  story("Darkness surrounds you...");
  setTimeout(()=>story("A Rift tears open before your eyes."),800);
  setTimeout(()=>story("Your fate waits."),1600);

  setTimeout(()=>{
    showContinue();
  },2400);
}

function showContinue(){
  const c=document.getElementById("choices");
  c.innerHTML="";

  let b=document.createElement("button");
  b.className="choice glow";
  b.textContent="✦ Continue ✦";
  b.onclick=startGame;
  c.appendChild(b);
}

// ===== GAME START =====
function startGame(){
  story("You step forward into the unknown.");
  document.getElementById("choices").innerHTML="";
  showMap();
}

// ===== MAP =====
function showMap(){
  const m=document.getElementById("map");
  m.innerHTML = `
    <button class="choice" onclick="travel('Rift Edge')">Rift Edge</button>
    <button class="choice" onclick="travel('War Camp')">War Camp</button>
    <button class="choice" onclick="travel('Ruins')">Ancient Ruins</button>
  `;
}

// ===== TRAVEL =====
function travel(loc){
  player.location=loc;
  story("You arrive at " + loc + ".");

  document.getElementById("choices").innerHTML="";
  document.getElementById("choices").appendChild(actionButton("Search"));
  document.getElementById("choices").appendChild(actionButton("Rest"));
}

// ===== ACTIONS =====
function actionButton(text){
  let b=document.createElement("button");
  b.className="choice";
  b.textContent=text;
  b.onclick=()=>doAction(text);
  return b;
}

function doAction(a){
  if(a==="Search"){
    if(Math.random()>0.5){
      story("You find something useful.");
      player.inventory.push("Scrap Relic");
    } else {
      story("You find nothing.");
    }
  }

  if(a==="Rest"){
    story("You take a moment to recover.");
    player.life = Math.min(100, player.life+10);
    player.will = Math.min(100, player.will+10);
  }
}

// ===== BOOT =====
startIntro();
</script>

</body>
</html>
