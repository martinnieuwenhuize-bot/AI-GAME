<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realm of Ash</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:#eee;
}

#app {
  max-width:500px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
}

#title-screen, #game-screen {
  padding:20px;
}

#game-screen { display:none; }

#story-area {
  flex:1;
  overflow-y:auto;
  margin-bottom:10px;
}

#choices-area {
  max-height:40vh;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

button {
  padding:12px;
  background:#222;
  border:1px solid #444;
  color:white;
}
</style>
</head>

<body>

<div id="app">

<div id="title-screen">
  <h1>Realm of Ash</h1>
  <input id="name" placeholder="Enter your name">
  <br><br>
  <button onclick="startGame()">Start</button>
</div>

<div id="game-screen">
  <div id="story-area"></div>
  <div id="choices-area"></div>
</div>

</div>

<script>
function startGame() {
  console.log("START CLICKED"); // debug check

  const name = document.getElementById("name").value || "Hero";

  document.getElementById("title-screen").style.display = "none";
  document.getElementById("game-screen").style.display = "block";

  writeStory("You wake on a ruined road, " + name + ".");
  showChoices(["Look around", "Walk forward", "Run"]);
}

function writeStory(text) {
  const div = document.createElement("div");
  div.textContent = text;

  const area = document.getElementById("story-area");
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showChoices(list) {
  const area = document.getElementById("choices-area");
  area.innerHTML = "";

  list.forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => selectChoice(choice);
    area.appendChild(btn);
  });
}

function selectChoice(choice) {
  writeStory("> " + choice);

  writeStory("Something happens...");

  showChoices(["Go again", "Do something else"]);
}
</script>

</body>
</html>
