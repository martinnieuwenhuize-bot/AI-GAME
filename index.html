<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rift RPG</title>

<style>
body{margin:0;background:#07090f;color:#ddd;font-family:serif;}
.hidden{display:none;}
button{
  width:100%;padding:12px;margin:6px 0;
  background:#121520;border:1px solid #333;color:#ddd;
}

/* Screens */
#title,#game,#overlay{
  position:fixed;inset:0;
}
#title{
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  background:radial-gradient(circle,#1a1330,#07090f);
}
#title h1{font-size:42px;color:#e0c7ff;text-shadow:0 0 30px #a55eea;}

#hud{padding:10px;border-bottom:1px solid #333;}
.bar{height:8px;background:#111;margin:4px 0;}
.fill{height:100%;}
.life{background:#2ed573;}
.will{background:#a55eea;}

#story{padding:10px;}
#story div{opacity:0;transition:.4s;}
#story .show{opacity:1;}

#map{padding:10px;}

#overlay{
  display:none;justify-content:center;align-items:center;
  background:#000d;
}
.box{
  background:#111;padding:20px;width:90%;
  max-width:380px;
}
</style>
</head>

<body>

<!-- TITLE -->
<div id="title">
  <h1>RIFT</h1>
  <p>A war between worlds</p>
  <button onclick="newGame()">New Game</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div id="hud"></div>
  <div id="story"></div>
  <div id="map"></div>
  <button onclick="openJournal()">📜 Quest Journal</button>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="box" id="overlayBox"></div>
</div>

<script>
/* ===== UI STATE MACHINE ===== */
const UI = { TITLE:"TITLE", GAME:"GAME", OVERLAY:"OVERLAY", ENDING:"ENDING" };
let uiState = UI.TITLE;

const titleEl = document.getElementById("title");
const gameEl = document.getElementById("game");
const overlayEl = document.getElementById("overlay");

function setUI(state){
  uiState = state;
  titleEl.classList.toggle("hidden", state !== UI.TITLE);
  gameEl.classList.toggle("hidden", state !== UI.GAME);
  overlayEl.style.display = (state === UI.OVERLAY || state === UI.ENDING) ? "flex" : "none";
}

/* ===== PLAYER ===== */
let player;

/* ===== UTIL ===== */
function story(t){
  let d=document.createElement("div");
  d.textContent=t;
  document.getElementById("story").appendChild(d);
  setTimeout(()=>d.classList.add("show"),10);
}
function hud(){
  document.getElementById("hud").innerHTML=`
  ❤️ ${player.life}/${player.maxLife}
  <div class="bar"><div class="fill life" style="width:${player.life}%"></div></div>
  ✦ ${player.will}/${player.maxWill}
  <div class="bar"><div class="fill will" style="width:${player.will}%"></div></div>
  🌍 ${player.location}
  `;
}

/* ===== GAME FLOW ===== */
function newGame(){
  player={
    life:100,maxLife:100,
    will:100,maxWill:100,
    location:"Rift Edge",
    quests:[{title:"The Rift Opens",step:"Investigate the Rift",done:false}]
  };

  document.getElementById("story").innerHTML="";
  setUI(UI.GAME);

  story("The Rift tears open the sky.");
  showMap();
  hud();
}

/* ===== MAP ===== */
function showMap(){
  document.getElementById("map").innerHTML=`
    <button onclick="travel('Rift Edge')">Rift Edge</button>
    <button onclick="travel('Border City')">Border City</button>
  `;
}
function travel(loc){
  player.location=loc;
  story("You arrive at "+loc+".");
  hud();
}

/* ===== JOURNAL ===== */
function openJournal(){
  setUI(UI.OVERLAY);
  document.getElementById("overlayBox").innerHTML=
    "<h3>Quest Journal</h3>" +
    player.quests.map(q=>`
      <p><strong>${q.title}</strong><br>${q.step}</p>
    `).join("") +
    `<button onclick="closeOverlay()">Close</button>`;
}

function closeOverlay(){
  setUI(UI.GAME);
}
</script>

</body>
</html>
