<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realm of Ash</title>

<style>
body {
  margin:0;
  background:#0c0906;
  color:#e8dcc8;
  font-family:serif;
}

#app {
  max-width:500px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
}

#title,#game { padding:20px; flex:1; display:flex; flex-direction:column; }
#game{display:none;}

#story{flex:1; overflow-y:auto;}
#choices{max-height:25vh; overflow-y:auto;}

button,input{padding:10px;margin-top:5px;}
button{background:#1a1410;border:1px solid #2e2318;color:#fff;}

</style>
</head>

<body>

<div id="app">

<div id="title">
  <h1>Realm of Ash</h1>

  <input id="name" placeholder="Name">
  <input id="appearance" placeholder="Describe yourself">

  <h3>Class</h3>
  <button onclick="setClass('Fighter')">Fighter</button>
  <button onclick="setClass('Rogue')">Rogue</button>
  <button onclick="setClass('Mage')">Mage</button>
  <button onclick="setClass('Cleric')">Cleric</button>

  <button onclick="start()">Begin</button>
  <button onclick="loadGame()">Load</button>
</div>

<div id="game">
  <div id="story"></div>
  <div id="choices"></div>

  <input id="input" placeholder="Type anything..." onkeydown="if(event.key==='Enter')act()">
  <button onclick="act()">Do it</button>

  <button onclick="saveGame()">💾 Save</button>

  <div id="stats"></div>
</div>

</div>

<script>

const API_URL = "https://YOUR-WORKER-URL.workers.dev";

let player = {
  name:"Hero",
  class:"Fighter",
  appearance:"",
  hp:100,
  inventory:["Health Potion"],
  reputation:{
    good:0,
    evil:0
  }
};

let worldMemory = []; // IMPORTANT
let history = [];
let log = [];
let enemy=null;

// ---------- UI ----------
function logText(t){
  log.push(t);
  let d=document.createElement("div");
  d.textContent=t;
  let s=document.getElementById("story");
  s.appendChild(d);
  s.scrollTop=s.scrollHeight;
}

// ---------- CLASS ----------
function setClass(c){ player.class=c; }

// ---------- START ----------
function start(){
  player.name=document.getElementById("name").value||"Hero";
  player.appearance=document.getElementById("appearance").value||"unknown";

  document.getElementById("title").style.display="none";
  document.getElementById("game").style.display="flex";

  updateStats();

  logText(`You are ${player.name}, a ${player.class}, ${player.appearance}.`);

  suggest(["look around","move forward","call out"]);
}

// ---------- STATS ----------
function updateStats(){
  document.getElementById("stats").textContent =
    `HP:${player.hp} | Inv:${player.inventory.join(", ")} | Rep(G:${player.reputation.good}/E:${player.reputation.evil})`;
}

// ---------- ACTION ----------
async function act(){
  let i=document.getElementById("input");
  let t=i.value.trim();
  if(!t) return;
  i.value="";
  process(t);
}

async function process(action){

  logText("> "+action);

  // record memory keywords
  trackMemory(action);

  // combat
  if(enemy){ combatTurn(action); return; }

  history.push({role:"user",content:action});

  const res=await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      message:action,
      history,
      player,
      worldMemory
    })
  });

  const data=await res.json();

  history.push({role:"assistant",content:data.text});

  let parsed=parseAI(data.text);

  logText(parsed.story);
  suggest(parsed.choices);

  if(Math.random()<0.3) startCombat();
}

// ---------- MEMORY TRACKER ----------
function trackMemory(action){

  let lower=action.toLowerCase();

  if(lower.includes("kill")){
    player.reputation.evil++;
    worldMemory.push("Player has killed someone");
  }

  if(lower.includes("save")||lower.includes("help")){
    player.reputation.good++;
    worldMemory.push("Player helped someone");
  }

  if(lower.includes("betray")){
    player.reputation.evil+=2;
    worldMemory.push("Player betrayed someone");
  }

  // limit memory size
  if(worldMemory.length>20) worldMemory.shift();
}

// ---------- PARSE ----------
function parseAI(text){
  let lines=text.split("\n");
  let story=[],choices=[];
  lines.forEach(l=>{
    if(l.trim().startsWith(">")) choices.push(l.replace(">","").trim());
    else story.push(l);
  });
  return {story:story.join("\n"),choices:choices.length?choices:["continue"]};
}

// ---------- CHOICES ----------
function suggest(arr){
  let b=document.getElementById("choices");
  b.innerHTML="";
  arr.forEach(c=>{
    let btn=document.createElement("button");
    btn.textContent=c;
    btn.onclick=()=>process(c);
    b.appendChild(btn);
  });
}

// ---------- COMBAT ----------
function startCombat(){
  enemy={name:"Ash Beast",hp:30};
  logText("⚔ A creature attacks!");
  suggest(["attack","use potion","run"]);
}

function combatTurn(a){

  if(a.includes("attack")){
    let d=Math.floor(Math.random()*10)+5;
    enemy.hp-=d;
    logText("You deal "+d);
  }

  if(a.includes("potion")){
    let i=player.inventory.indexOf("Health Potion");
    if(i>-1){
      player.hp+=20;
      player.inventory.splice(i,1);
      logText("Healed 20");
    }else logText("No potion");
  }

  if(a.includes("run")){
    logText("You escaped");
    enemy=null;
    suggest(["continue"]);
    return;
  }

  if(enemy.hp<=0){
    logText("Enemy slain");
    player.inventory.push("Loot");
    enemy=null;
    updateStats();
    suggest(["continue","search"]);
    return;
  }

  let ed=Math.floor(Math.random()*8)+3;
  player.hp-=ed;
  logText("Enemy hits "+ed);

  if(player.hp<=0){
    logText("💀 You died");
    return;
  }

  updateStats();
  suggest(["attack","use potion","run"]);
}

// ---------- SAVE ----------
function saveGame(){
  localStorage.setItem("realmSave",JSON.stringify({
    player,history,log,worldMemory
  }));
  alert("Saved");
}

// ---------- LOAD ----------
function loadGame(){
  let s=localStorage.getItem("realmSave");
  if(!s) return alert("No save");

  let d=JSON.parse(s);
  player=d.player;
  history=d.history;
  log=d.log;
  worldMemory=d.worldMemory||[];

  document.getElementById("title").style.display="none";
  document.getElementById("game").style.display="flex";

  let area=document.getElementById("story");
  area.innerHTML="";
  log.forEach(t=>{
    let el=document.createElement("div");
    el.textContent=t;
    area.appendChild(el);
  });

  updateStats();
  suggest(["continue"]);
}

</script>

</body>
</html>
