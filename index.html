<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Realm of Ash</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#0c0906; --card:#1a1410; --border:#2e2318;
  --gold:#c9922a; --text:#e8dcc8; --muted:#7a6a55;
}

/* ✅ FIXED: allow scrolling */
html, body {
  height:100%;
  background:var(--bg);
  color:var(--text);
  overflow:auto;
  font-family: serif;
}

/* ✅ FIXED: stable height */
#app {
  display:flex;
  flex-direction:column;
  height:100vh;
  max-width:500px;
  margin:auto;
}

/* screens */
#title-screen, #game-screen {
  flex:1;
  display:flex;
  flex-direction:column;
}

#game-screen { display:none; }

/* story scroll */
#story-area {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* ✅ FIXED: SCROLLABLE CHOICES */
#choices-area {
  border-top:1px solid var(--border);
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;

  max-height:35vh;
  overflow-y:auto;
}

/* buttons */
.choice-btn {
  padding:12px;
  background:var(--card);
  border:1px solid var(--border);
  color:var(--text);
  cursor:pointer;
}

/* ✅ mobile polish */
body {
  overscroll-behavior: contain;
}

button {
  touch-action: manipulation;
}
</style>
</head>

<body>

<div id="app">

<!-- TITLE -->
<div id="title-screen">
  <h1>Realm of Ash</h1>
  <input id="name" placeholder="Your name">
  <button onclick="startGame()">Start</button>
</div>

<!-- GAME -->
<div id="game-screen">
  <div id="story-area"></div>
  <div id="choices-area"></div>
</div>

</div>

<script>

let player = { name:"Hero", hp:100 };

function startGame(){
  player.name = document.getElementById("name").value || "Hero";

  document.getElementById("title-screen").style.display="none";
  document.getElementById("game-screen").style.display="flex";

  writeStory("You wake on a broken road. Something moves in the dark...");
  showChoices([
    "Look around",
    "Walk forward",
    "Shout into the darkness",
    "Sit and wait (bad idea)"
  ]);
}

function writeStory(text){
  const div = document.createElement("div");
  div.textContent = text;
  document.getElementById("story-area").appendChild(div);

  // auto-scroll
  const area = document.getElementById("story-area");
  area.scrollTop = area.scrollHeight;
}

function showChoices(choices){
  const area = document.getElementById("choices-area");
  area.innerHTML = "";

  choices.forEach(c=>{
    const btn = document.createElement("button");
    btn.className="choice-btn";
    btn.textContent=c;
    btn.onclick=()=>choose(c);
    area.appendChild(btn);
  });
}
