<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realm of Ash</title>

<style>
body {
  margin:0;
  background:#0c0906;
  color:#e8dcc8;
  font-family:serif;
}
#app {max-width:500px;margin:auto;height:100vh;display:flex;flex-direction:column;}
#title,#game{padding:20px;flex:1;display:flex;flex-direction:column;}
#game{display:none;}
#story{flex:1;overflow-y:auto;margin-bottom:10px;}
#choices{max-height:30vh;overflow-y:auto;}
button,input{padding:10px;margin-top:5px;}
button{background:#1a1410;border:1px solid #2e2318;color:#fff;}
</style>
</head>

<body>

<div id="app">

<div id="title">
  <h1>Realm of Ash</h1>
  <input id="name" placeholder="Name">
  <input id="appearance" placeholder="Describe yourself">

  <h3>Class</h3>
  <button onclick="setClass('Fighter')">Fighter</button>
  <button onclick="setClass('Rogue')">Rogue</button>
  <button onclick="setClass('Mage')">Mage</button>
  <button onclick="setClass('Cleric')">Cleric</button>

  <button onclick="start()">Begin</button>
  <button onclick="loadGame()">Load</button>
</div>

<div id="game">
  <div id="story"></div>
  <div id="choices"></div>

  <input id="input" placeholder="Type anything..."
    onkeydown="if(event.key==='Enter')act()">
  <button onclick="act()">Do it</button>

  <button onclick="saveGame()">💾 Save</button>
</div>

</div>

<script>

// ---------- PLAYER ----------
let player={
  name:"Hero",
  class:"Fighter",
  appearance:""
};

let memory=[];
let log=[];

// ---------- START ----------
function start(){
  player.name=document.getElementById("name").value||"Hero";
  player.appearance=document.getElementById("appearance").value||"unknown";

  document.getElementById("title").style.display="none";
  document.getElementById("game").style.display="flex";

  narrate(`You are ${player.name}, a ${player.class}, ${player.appearance}. The world feels restless around you.`);
  suggest(["look around","move forward","listen"]);
}

// ---------- STORY ----------
function narrate(text){
  log.push(text);

  let d=document.createElement("div");
  d.textContent=text;

  let area=document.getElementById("story");
  area.appendChild(d);
  area.scrollTop=area.scrollHeight;
}

// ---------- ACTION ----------
function act(){
  let i=document.getElementById("input");
  let t=i.value.trim();
  if(!t) return;

  i.value="";
  process(t);
}

function process(action){
  narrate("> "+action);
  memory.push(action);

  let text = buildNarrative(action);
  narrate(text);

  suggest(generateChoices(action));
}

// ---------- NARRATION ENGINE ----------
function buildNarrative(action){

  const settings = [
    "a narrow dirt road with scattered stones and muddy tracks",
    "a dim alley where shadows cling to broken wood and stone",
    "a windswept path littered with debris and scraps of cloth",
    "a bustling but uneasy street filled with wary faces"
  ];

  const sounds = [
    "distant shouting",
    "laughter echoing from somewhere unseen",
    "the clatter of metal and wood",
    "a low murmur of voices"
  ];

  const events = [
    "A dog snarls from beneath a broken cart.",
    "A pair of children dart past you, chasing each other.",
    "Someone watches you from a window before quickly retreating.",
    "You notice fresh footprints leading away."
  ];

  let place = settings[Math.floor(Math.random()*settings.length)];
  let sound = sounds[Math.floor(Math.random()*sounds.length)];
  let event = events[Math.floor(Math.random()*events.length)];

  let memoryRef = "";
  if(memory.length > 2){
    let past = memory[Math.floor(Math.random()*memory.length)];
    memoryRef = ` You can't shake the memory of when you tried to "${past}".`;
  }

  return `You move to ${action}. Around you stretches ${place}. The air carries ${sound}. ${event}.${memoryRef}`;
}

// ---------- CHOICES ----------
function generateChoices(action){
  let base=[
    "look closer",
    "continue forward",
    "change direction",
    "interact with something nearby"
  ];

  if(action.includes("tavern")){
    base=["enter tavern","listen outside","circle building","leave"];
  }

  return base;
}

function suggest(arr){
  let box=document.getElementById("choices");
  box.innerHTML="";
  arr.forEach(c=>{
    let b=document.createElement("button");
    b.textContent=c;
    b.onclick=()=>process(c);
    box.appendChild(b);
  });
}

// ---------- SAVE ----------
function saveGame(){
  localStorage.setItem("realmSave",JSON.stringify({player,memory,log}));
  alert("Saved");
}

// ---------- LOAD ----------
function loadGame(){
  let s=localStorage.getItem("realmSave");
  if(!s) return alert("No save");

  let d=JSON.parse(s);
  player=d.player;
  memory=d.memory;
  log=d.log;

  document.getElementById("title").style.display="none";
  document.getElementById("game").style.display="flex";

  let area=document.getElementById("story");
  area.innerHTML="";
  log.forEach(t=>{
    let el=document.createElement("div");
    el.textContent=t;
    area.appendChild(el);
  });

  suggest(["continue"]);
}

</script>

</body>
</html>
