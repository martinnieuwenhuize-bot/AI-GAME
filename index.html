<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rift RPG</title>

<style>
body {
  font-family: serif;
  background: #080a0f;
  color: #ddd;
  padding: 10px;
}

h2 { color: gold; text-align:center; }

/* HUD */
#hud {
  border:1px solid #444;
  padding:8px;
  margin-bottom:10px;
}

.bar {
  height:10px;
  background:#222;
  margin:5px 0;
}

.fill {
  height:100%;
}

.life { background:linear-gradient(green,lime); }
.will { background:linear-gradient(purple,violet); }

/* UI */
button {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
  background:#111;
  color:#ddd;
  border:1px solid #444;
}

input {
  width:100%;
  padding:10px;
}

#story {
  min-height: 200px;
  white-space: pre-line;
}
</style>
</head>

<body>

<h2>⚔ Rift RPG</h2>

<div id="hud"></div>

<div id="story"></div>
<div id="choices"></div>

<script>

let player = {
  life: 100,
  maxLife:100,
  will: 100,
  maxWill:100,
  gold: 0,
  level:1,
  spells: []
};

let combat = null;

// ===== HUD =====
function updateHUD() {
  document.getElementById("hud").innerHTML = `
    ❤️ ${player.life}/${player.maxLife}
    <div class="bar"><div class="fill life" style="width:${player.life}%"></div></div>
    
    ✦ ${player.will}/${player.maxWill}
    <div class="bar"><div class="fill will" style="width:${player.will}%"></div></div>
    
    🪙 ${player.gold} | Lv ${player.level}
    
    ${combat ? `<br>⚔ Enemy: ${combat.name} (${combat.hp} HP)` : ""}
  `;
}

// ===== STORY =====
function addStory(text) {
  const el = document.createElement("div");
  document.getElementById("story").appendChild(el);

  let i = 0;
  function type(){
    if(i < text.length){
      el.innerHTML += text[i++];
      setTimeout(type,10);
    }
  }
  type();

  document.getElementById("story").scrollTop = 99999;
}

// ===== STORY ENGINE (LESS RANDOM) =====
const storyBeats = [
  "The Rift pulses violently.",
  "You sense unseen forces watching.",
  "A distant horn echoes across the land."
];

function generateStory(action){
  const beat = storyBeats[Math.floor(Math.random()*storyBeats.length)];

  return {
    narrative: beat + " You choose to " + action + ".",
    choices:["Advance","Investigate","Withdraw"],
    enemy: Math.random() > 0.5 ? "Tsurani Warrior" : null
  };
}

// ===== FLOW =====
function handleInput(input) {
  addStory("> " + input);

  if(combat) return;

  const data = generateStory(input);
  process(data);
}

function process(d){
  addStory(d.narrative);

  if(d.enemy) {
    startCombat(d.enemy, 40 + player.level * 5);
  }

  renderChoices(d.choices);
  updateHUD();
}

// ===== CHOICES =====
function renderChoices(list){
  const area = document.getElementById("choices");
  area.innerHTML="";

  list.forEach(c=>{
    const b=document.createElement("button");
    b.textContent=c;
    b.onclick=()=>handleInput(c);
    area.appendChild(b);
  });

  const input=document.createElement("input");
  input.placeholder="Your action...";
  input.onkeydown=e=>{
    if(e.key==="Enter") handleInput(input.value);
  };
  area.appendChild(input);
}

// ===== COMBAT =====
function startCombat(name,hp){
  combat = {name,hp};
  addStory("⚔ You are attacked by " + name);
  renderCombat();
  updateHUD();
}

function renderCombat(){
  const area=document.getElementById("choices");
  area.innerHTML="";

  player.spells.forEach(s=>{
    const b=document.createElement("button");
    b.textContent=s.name;
    b.onclick=()=>cast(s);
    area.appendChild(b);
  });

  const atk=document.createElement("button");
  atk.textContent="Strike";
  atk.onclick=attack;
  area.appendChild(atk);
}

function attack(){
  const dmg=Math.floor(Math.random()*10+5);
  combat.hp-=dmg;

  addStory("You strike for "+dmg);

  checkCombat();
}

function cast(spell){
  if(player.will < spell.cost){
    addStory("Not enough will!");
    return;
  }

  player.will -= spell.cost;
  combat.hp -= spell.damage;

  addStory("You cast " + spell.name + " ("+spell.damage+")");

  checkCombat();
}

function enemyTurn(){
  const dmg=Math.floor(Math.random()*8+4);
  player.life-=dmg;

  addStory("Enemy hits for "+dmg);
}

function checkCombat(){
  if(combat.hp <= 0){
    addStory("Enemy defeated!");

    player.gold += 10;
    player.level++;

    if(Math.random()>0.5) unlockSpell();

    combat=null;
    renderChoices(["Continue"]);
  } else {
    enemyTurn();
  }

  updateHUD();
}

// ===== SPELLS =====
function unlockSpell(){
  const pool = [
    {name:"Spark",damage:10,cost:5},
    {name:"Flame Burst",damage:20,cost:10}
  ];

  const s = pool[Math.floor(Math.random()*pool.length)];
  player.spells.push(s);
  addStory("You learned " + s.name);
}

// ===== SAVE =====
function save(){
  localStorage.setItem("rift",JSON.stringify(player));
}
setInterval(save,5000);

// ===== START =====
addStory("You stand before the Rift. It calls to you.");

updateHUD();

renderChoices([
  "Step into the Rift",
  "Study it",
  "Leave"
]);

</script>

</body>
</html>
