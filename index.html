<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rift RPG – Campaign Mode</title>

<style>
body{margin:0;background:#07090f;color:#ddd;font-family:serif;}
.hidden{display:none;}
button{
  width:100%;padding:12px;margin:6px 0;
  background:#121520;border:1px solid #333;color:#ddd;
}
#title{
  position:fixed;inset:0;display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  background:radial-gradient(circle,#1a1330,#07090f);
}
#title h1{
  font-size:42px;color:#e0c7ff;
  text-shadow:0 0 30px #a55eea;
}
#hud{padding:10px;border-bottom:1px solid #333;}
.bar{height:8px;background:#111;margin:4px 0;}
.fill{height:100%;}
.life{background:#2ed573;}
.will{background:#a55eea;}
#story{padding:10px;}
#story div{opacity:0;transition:.4s;}
#story .show{opacity:1;}
#map{padding:10px;}
#overlay{
  position:fixed;inset:0;background:#000d;
  display:none;justify-content:center;align-items:center;
}
.box{background:#111;padding:20px;width:90%;max-width:360px;}
</style>
</head>

<body>

<!-- TITLE -->
<div id="title">
  <h1>RIFT</h1>
  <p>The Rift War Begins</p>
  <button onclick="newGame()">New Game</button>
  <button onclick="loadGame()">Load Game</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div id="hud"></div>
  <div id="story"></div>
  <div id="map"></div>
  <button onclick="openInventory()">🎒 Inventory</button>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div class="box" id="overlayBox"></div>
</div>

<script>
// ===== SAVE / LOAD =====
function saveGame(){
  localStorage.setItem("riftCampaign",JSON.stringify(player));
}
function loadGame(){
  let s=localStorage.getItem("riftCampaign");
  if(!s) return alert("No save found");
  player=JSON.parse(s);
  startCampaign();
}

// ===== PLAYER =====
let player;

// ===== NEW GAME =====
function newGame(){
  player={
    life:100,maxLife:100,
    will:100,maxWill:100,
    gold:30,
    chapter:1,
    location:"Rift Edge",
    faction:{Isles:0,Tsurani:0},
    inventory:[],
    gear:{weapon:null,armor:null,relic:null}
  };
  startCampaign();
}

// ===== START =====
function startCampaign(){
  document.getElementById("title").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  story(`📖 Chapter ${player.chapter}: The Rift Opens`);
  showMap();
  hud();
  saveGame();
}

// ===== UI =====
function story(t){
  let d=document.createElement("div");
  d.textContent=t;
  document.getElementById("story").appendChild(d);
  setTimeout(()=>d.classList.add("show"),10);
}
function hud(){
  document.getElementById("hud").innerHTML=`
  ❤️ ${player.life}/${player.maxLife}
  <div class="bar"><div class="fill life" style="width:${player.life}%"></div></div>
  ✦ ${player.will}/${player.maxWill}
  <div class="bar"><div class="fill will" style="width:${player.will}%"></div></div>
  🪙 ${player.gold} | 📍 ${player.location}<br>
  📖 Chapter ${player.chapter}<br>
  🏰 Isles: ${player.faction.Isles} | ⚔ Tsurani: ${player.faction.Tsurani}
  `;
}

// ===== MAP =====
function showMap(){
  let html=`<button onclick="travel('Rift Edge')">Rift Edge</button>`;
  if(player.chapter>=2) html+=`<button onclick="travel('Border City')">Border City</button>`;
  if(player.chapter>=3) html+=`<button onclick="travel('War Camp')">War Camp</button>`;
  document.getElementById("map").innerHTML=html;
}

// ===== TRAVEL =====
function travel(loc){
  player.location=loc;
  story("You arrive at "+loc+".");
  if(loc==="Border City") openShop("Isles");
  if(loc==="War Camp") openShop("Tsurani");
  npcEncounter();
  hud();
  saveGame();
}

// ===== NPC / FACTION =====
function npcEncounter(){
  story("An emissary approaches.");
  document.getElementById("map").innerHTML+=`
    <button onclick="aidIsles()">Aid the Isles</button>
    <button onclick="aidTsurani()">Aid the Tsurani</button>
  `;
}
function aidIsles(){
  player.faction.Isles+=5;
  story("You aid the Kingdom of the Isles.");
  advanceChapter();
}
function aidTsurani(){
  player.faction.Tsurani+=5;
  story("You side with the Tsurani Empire.");
  advanceChapter();
}

// ===== CHAPTER PROGRESSION =====
function advanceChapter(){
  if(player.chapter===1 && (player.faction.Isles>=5||player.faction.Tsurani>=5)){
    player.chapter=2;
    story("📖 Chapter II: Allegiances Form");
  }
  if(player.chapter===2 && (player.faction.Isles>=10||player.faction.Tsurani>=10)){
    player.chapter=3;
    story("📖 Chapter III: The Rift Decides");
    checkEnding();
  }
  showMap();
  hud();
  saveGame();
}

// ===== ENDINGS =====
function checkEnding(){
  if(player.faction.Isles>player.faction.Tsurani){
    ending("The Isles Endure","You helped preserve Midkemia.");
  } else if(player.faction.Tsurani>player.faction.Isles){
    ending("The Empire Ascends","The Tsurani reshape both worlds.");
  } else {
    ending("The Rift Remains","Neither side prevails. The war continues.");
  }
}
function ending(title,text){
  document.getElementById("overlay").style.display="flex";
  document.getElementById("overlayBox").innerHTML=`
    <h2>${title}</h2>
    <p>${text}</p>
    <button onclick="resetGame()">Return to Title</button>
  `;
}

// ===== SHOP =====
function openShop(faction){
  let priceMod = faction==="Isles"
    ? Math.max(1,5-player.faction.Isles)
    : Math.max(1,5-player.faction.Tsurani);

  document.getElementById("overlay").style.display="flex";
  document.getElementById("overlayBox").innerHTML=`
    <h3>${faction} Shop</h3>
    <button onclick="buy('Sword',20*priceMod)">Sword (${20*priceMod}g)</button>
    <button onclick="buy('Armor',25*priceMod)">Armor (${25*priceMod}g)</button>
    <button onclick="closeOverlay()">Leave</button>
  `;
}
function buy(item,cost){
  if(player.gold>=cost){
    player.gold-=cost;
    player.inventory.push(item);
    story("You bought "+item+".");
    hud();
    saveGame();
  } else story("Not enough gold.");
}

// ===== INVENTORY =====
function openInventory(){
  document.getElementById("overlay").style.display="flex";
  document.getElementById("overlayBox").innerHTML=
    `<h3>Inventory</h3>`+
    player.inventory.join("<br>")+
    `<button onclick="closeOverlay()">Close</button>`;
}

// ===== UTILS =====
function closeOverlay(){
  document.getElementById("overlay").style.display="none";
}
function resetGame(){
  localStorage.removeItem("riftCampaign");
  location.reload();
}
</script>

</body>
</html>
