<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realm of Milamber</title>

<style>
body {
  margin:0;
  background:#0c0906;
  color:#e8dcc8;
  font-family:serif;
}

#app {
  max-width:500px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
}

#story {
  flex:1;
  overflow-y:auto;
  padding:15px;
}

input,button {
  padding:10px;
  margin-top:5px;
  background:#1a1410;
  color:white;
}

.choice {
  background:#2a1e10;
  margin-top:4px;
}
</style>
</head>

<body>

<div id="app">

<div id="story"></div>

<input id="input" placeholder="Type anything..."
onkeydown="if(event.key==='Enter')act()">
<button onclick="act()">Do</button>

<div id="choices"></div>
<div id="stats"></div>

</div>

<script>

// ================= PLAYER =================
let player = {
  reputation:0,
  location:"tavern",
  room:"bar"
};

// ================= TIME =================
let time=0;
let day=1;
let phases=["Morning","Day","Evening","Night"];

// ================= WEATHER =================
let weather="Clear";
let weatherTypes=["Clear","Rain","Storm"];

// ================= PLAYSTYLE =================
let playstyle={violent:0, stealth:0, heroic:0};

// ================= FACTIONS =================
let factions = {
  law:{name:"Guards", power:5, allies:["civil"], enemies:["shady"], opinion:0},
  shady:{name:"Criminals", power:5, allies:[], enemies:["law"], opinion:0},
  civil:{name:"Townfolk", power:5, allies:["law"], enemies:[], opinion:0}
};

// ================= AREAS =================
let areas = {
  tavern:{control:"civil"},
  street:{control:"law"},
  forest:{control:"shady"}
};

// ================= WORLD =================
let world = {
  tavern:{
    bar:{desc:"a crowded tavern bar", npcs:["borin","guard"]},
    backroom:{desc:"a shadowy backroom", npcs:["shady"]},
    upstairs:{desc:"creaking upper hallway", npcs:[]}
  },
  town:{
    street:{desc:"a muddy street", npcs:["guard"]}
  },
  forest:{
    clearing:{desc:"a dark forest clearing", npcs:["shady"]}
  }
};

// ================= NPCS =================
let npcs = {
  borin:{name:"Borin", faction:"civil", trust:0, loyalty:0, grudge:0, emotion:"neutral", memory:[]},
  shady:{name:"Unknown Man", faction:"shady", trust:0, loyalty:0, grudge:0, emotion:"paranoid", memory:[]},
  guard:{name:"Guard", faction:"law", trust:0, loyalty:0, grudge:0, emotion:"strict", memory:[]}
};

// ================= EVENTS =================
let worldEvents=[];

// ================= UI =================
function narrate(t){
  let d=document.createElement("div");
  d.textContent=t;
  story.appendChild(d);
  d.scrollIntoView();
}

function statsUpdate(){
  stats.textContent=
  `Rep:${player.reputation} | Day:${day} ${phases[time%4]} | Weather:${weather} | Control:${areas[player.location]?.control}`;
}

// ================= TIME =================
function advanceTime(){
  time++;
  if(time%4===0) day++;

  if(Math.random()<0.3){
    weather=weatherTypes[Math.floor(Math.random()*3)];
    narrate("Weather shifts to "+weather);
  }

  factionWar();
  factionAllianceShift();
  npcGossip();
}

// ================= FACTION WAR =================
function factionWar(){

  if(Math.random()<0.3){

    let keys=Object.keys(factions);
    let a=keys[Math.floor(Math.random()*keys.length)];
    let b=keys[Math.floor(Math.random()*keys.length)];

    if(a!==b){

      narrate(`${factions[a].name} clash with ${factions[b].name}!`);

      let zone=Object.keys(areas)[Math.floor(Math.random()*3)];

      areas[zone].control=a;

      narrate(`${factions[a].name} seize control of the ${zone}.`);

      worldEvents.push(`${a} captured ${zone}`);
    }
  }
}

// ================= ALLIANCE SYSTEM =================
function factionAllianceShift(){

  if(Math.random()<0.2){

    let keys=Object.keys(factions);
    let a=keys[Math.floor(Math.random()*keys.length)];
    let b=keys[Math.floor(Math.random()*keys.length)];

    if(a!==b){
      factions[a].allies.push(b);
      narrate(`${factions[a].name} align themselves with ${factions[b].name}.`);
    }
  }
}

// ================= INPUT =================
function act(){
  let text=input.value.toLowerCase();
  input.value="";

  advanceTime();
  process(text);
}

// ================= PROCESS =================
function process(text){

  narrate("> "+text);

  // ===== PLAYSTYLE =====
  if(text.includes("attack")) playstyle.violent++;
  if(text.includes("help")) playstyle.heroic++;
  if(text.includes("sneak")) playstyle.stealth++;

  // ===== REPUTATION =====
  if(text.includes("attack")){
    player.reputation--;
    factions.law.opinion-=2;
    factions.shady.opinion+=1;
    recordEvent("you attacked someone");
  }

  if(text.includes("help")){
    player.reputation++;
    factions.civil.opinion+=2;
    recordEvent("you helped someone");
  }

  // ===== MOVEMENT =====
  if(text.includes("bar")){player.location="tavern";player.room="bar";}
  if(text.includes("backroom")){player.location="tavern";player.room="backroom";}
  if(text.includes("upstairs")){player.location="tavern";player.room="upstairs";}
  if(text.includes("street")){player.location="town";player.room="street";}
  if(text.includes("forest")){player.location="forest";player.room="clearing";}

  // ===== INTERACTION =====
  if(text.includes("talk")){
    dialogueChoices();
  }

  handleGroupReactions(text);

  narrate(cinematicNarration(text));

  statsUpdate();
}

// ================= EVENT MEMORY =================
function recordEvent(desc){

  let e={
    desc,
    day,
    time:phases[time%4],
    weather
  };

  worldEvents.push(e);

  Object.values(npcs).forEach(n=>n.memory.push(e));
}

// ================= GROUP REACTIONS =================
function handleGroupReactions(text){

  let room = world[player.location]?.[player.room];
  if(!room) return;

  let present=room.npcs;

  if(present.length>1){

    let a=npcs[present[0]];
    let b=npcs[present[1]];

    narrate(`${a.name} and ${b.name} exchange looks after what you said.`);

    if(text.includes("attack") && a.faction==="law"){
      narrate(`${a.name}: "That's enough."`);
    }
  }
}

// ================= CINEMATIC =================
function cinematicNarration(text){

  let tone = "";
  let style = getStyle();

  if(style==="violent") tone="You carry a threatening presence.";
  if(style==="heroic") tone="Your presence inspires quiet confidence.";
  if(style==="stealth") tone="You barely draw attention.";

  let control = areas[player.location]?.control;

  let factionTone = "";

  if(control==="law") factionTone="Order dominates the area.";
  if(control==="shady") factionTone="Danger lingers in every corner.";
  if(control==="civil") factionTone="People tread carefully.";

  return `${tone}
${factionTone}
The world shifts subtly around your actions.`;
}

// ================= PLAYSTYLE =================
function getStyle(){

  let max=Math.max(playstyle.violent,playstyle.stealth,playstyle.heroic);

  if(max===playstyle.violent) return "violent";
  if(max===playstyle.stealth) return "stealth";
  if(max===playstyle.heroic) return "heroic";

  return "neutral";
}

// ================= DIALOGUE =================
function dialogueChoices(){

  choices.innerHTML="";

  let opts=[
    {t:"Polite",a:"polite"},
    {t:"Ask",a:"ask"},
    {t:"Boast",a:"boast"},
    {t:"Threaten",a:"threat"}
  ];

  opts.forEach(o=>{
    let b=document.createElement("button");
    b.textContent=o.t;
    b.className="choice";
    b.onclick=()=>dialogue(o.a);
    choices.appendChild(b);
  });
}

function dialogue(choice){

  choices.innerHTML="";

  let npc=npcs.borin;

  if(choice==="polite"){
    npc.trust+=2;
    narrate("You speak respectfully.");
  }

  if(choice==="threat"){
    npc.grudge+=3;
    narrate("You threaten them.");
  }

  narrate(npc.name+": "+generateDialogue(npc));
}

function generateDialogue(npc){

  let lines=[];

  if(npc.memory.length){
    let e=npc.memory[Math.floor(Math.random()*npc.memory.length)];
    lines.push(`I remember when ${e.desc} on day ${e.day}.`);
  }

  if(player.reputation>3){
    lines.push("You're gaining influence.");
  }

  if(player.reputation<-3){
    lines.push("People fear you.");
  }

  if(npc.faction==="law"){
    lines.push("We're watching you closely.");
  }

  if(npc.faction==="shady"){
    lines.push("You might be useful.");
  }

  return lines[Math.floor(Math.random()*lines.length)];
}

// ================= GOSSIP =================
function npcGossip(){

  if(worldEvents.length<2) return;

  if(Math.random()<0.3){
    let e=worldEvents[Math.floor(Math.random()*worldEvents.length)];
    narrate(`<whisper> "${e.desc}..."`);
  }
}

// ================= START =================
narrate("Welcome to the Realm of Milamber.");
statsUpdate();

</script>
</body>
</html>
