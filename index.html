<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rift RPG Ultimate</title>

<style>
body {
  background:#07090f;
  color:#ddd;
  font-family:serif;
  margin:0;
  padding:10px;
}

h2 { text-align:center; color:#eccc68; }

/* HUD */
#hud { border-bottom:1px solid #333; padding-bottom:10px; }

.bar { height:8px; background:#111; margin:5px 0; border-radius:4px; }
.fill { height:100%; border-radius:4px; transition:.4s }

.life { background:#2ed573; }
.will { background:#a55eea; }
.xp { background:#ffa502; }

/* Buttons */
.choice {
  width:100%;
  padding:12px;
  margin:5px 0;
  background:#121520;
  border:1px solid #333;
  color:#ccc;
}

/* Glow button */
.glow {
  border-color:#a55eea;
  box-shadow:0 0 15px #a55eea;
  animation:pulse 1.5s infinite;
}
@keyframes pulse {
  0%{box-shadow:0 0 5px #a55eea}
  50%{box-shadow:0 0 20px #a55eea}
  100%{box-shadow:0 0 5px #a55eea}
}

/* Map animation */
#map.slide {
  animation:slideUp .4s;
}
@keyframes slideUp {
  from{transform:translateY(30px);opacity:0}
  to{transform:translateY(0);opacity:1}
}

#story div {
  opacity:0;
  transition:.5s;
}

</style>
</head>

<body>

<h2>⚔ Rift RPG</h2>

<div id="hud"></div>
<div id="story"></div>
<div id="choices"></div>
<div id="map"></div>

<script>

// ===== PLAYER =====
let player = {
  life:100,maxLife:100,
  will:100,maxWill:100,
  xp:0,level:1,
  gold:0,
  location:"Rift Edge",
  spells:[{name:"Spark",d:10,c:5}]
};

let combat=null;
let music=null;

// ===== SAVE =====
function save(){ localStorage.setItem("riftFinal",JSON.stringify(player)); }
function load(){
  let s=localStorage.getItem("riftFinal");
  if(s) player=JSON.parse(s);
}
load();
setInterval(save,4000);

// ===== HUD =====
function updateHUD(){
  document.getElementById("hud").innerHTML=`
  ❤️ ${player.life}/${player.maxLife}
  <div class="bar"><div class="fill life" style="width:${player.life}%"></div></div>

  ✦ ${player.will}/${player.maxWill}
  <div class="bar"><div class="fill will" style="width:${player.will}%"></div></div>

  ⭐ ${player.xp}/100
  <div class="bar"><div class="fill xp" style="width:${player.xp}%"></div></div>

  🪙 ${player.gold} | Lv ${player.level} | 📍 ${player.location}
  ${combat ? "<br>⚔ "+combat.name+" ("+combat.hp+")" : ""}
  `;
}

// ===== STORY =====
function story(text){
  let d=document.createElement("div");
  d.textContent=text;
  document.getElementById("story").appendChild(d);
  setTimeout(()=>d.style.opacity=1,10);
  window.scrollTo(0,9999);
}

// ===== INTRO =====
function intro(){
  story("Darkness...");
  setTimeout(()=>story("A distant hum reaches your mind..."),800);
  setTimeout(()=>story("The Rift has opened."),1600);
  setTimeout(()=>story("Something is coming through..."),2400);

  setTimeout(()=>{
    showStartButton();
  },3200);
}

function showStartButton(){
  let c=document.getElementById("choices");
  c.innerHTML="";

  let btn=document.createElement("button");
  btn.className="choice glow";
  btn.textContent="✦ Enter the Rift ✦";
  btn.onclick=startGame;

  c.appendChild(btn);
}

// ===== START GAME =====
function startGame(){
  story("You step into fate...");
  document.getElementById("choices").innerHTML="";
  showMap();
  playMusic();
}

// ===== MAP =====
function showMap(){
  if(combat) return;

  let m=document.getElementById("map");
  m.innerHTML=`
    <button class="choice" onclick="travel('Rift Edge')">Rift Edge</button>
    <button class="choice" onclick="travel('War Camp')">War Camp</button>
    <button class="choice" onclick="travel('Ruins')">Ancient Ruins</button>
  `;

  m.classList.remove("slide");
  void m.offsetWidth;
  m.classList.add("slide");
}

// ===== TRAVEL =====
function travel(loc){
  player.location=loc;
  story("You arrive at "+loc);
  randomEvent();
  updateHUD();
}

// ===== EVENTS =====
function randomEvent(){
  if(Math.random()>0.5){
    startCombat();
  } else {
    story("The area is quiet...");
    renderChoices(["Search","Rest"]);
  }
}

// ===== ENEMY =====
function startCombat(){
  let types=[
    {name:"Warrior",hp:40,atk:8},
    {name:"Brute",hp:60,atk:10},
    {name:"Mage",hp:30,atk:12}
  ];
  combat=types[Math.floor(Math.random()*types.length)];

  story("⚔ "+combat.name+" attacks!");
  renderCombat();
  updateHUD();
}

// ===== COMBAT UI =====
function renderCombat(){
  let c=document.getElementById("choices");
  c.innerHTML="";

  player.spells.forEach(s=>{
    let b=document.createElement("button");
    b.className="choice";
    b.textContent=s.name;
    b.onclick=()=>cast(s);
    c.appendChild(b);
  });

  let atk=document.createElement("button");
  atk.className="choice";
  atk.textContent="Attack";
  atk.onclick=attack;
  c.appendChild(atk);
}

// ===== ATTACK =====
function attack(){
  let dmg=Math.floor(Math.random()*10+5);
  if(Math.random()>0.8){
    dmg*=2;
    story("💥 Critical hit!");
  }
  combat.hp-=dmg;
  story("You deal "+dmg);
  navigator.vibrate?.(50);
  checkCombat();
}

// ===== SPELL =====
function cast(s){
  if(player.will<s.c){
    story("Not enough will!");
    return;
  }
  player.will-=s.c;
  combat.hp-=s.d;
  story("✨ "+s.name);
  checkCombat();
}

// ===== ENEMY TURN =====
function enemyTurn(){
  player.life-=combat.atk;
  story("Enemy hits "+combat.atk);
  navigator.vibrate?.(80);
}

// ===== CHECK =====
function checkCombat(){
  if(combat.hp<=0){
    story("Enemy defeated!");

    player.gold+=10;
    player.xp+=25;

    if(player.xp>=100){
      player.level++;
      player.xp=0;
      unlockSpell();
      story("LEVEL UP!");
    }

    combat=null;
    renderChoices(["Continue"]);
    showMap();

  } else {
    enemyTurn();
    renderCombat();
  }

  if(player.life<=0){
    story("☠ You died...");
    localStorage.clear();
    setTimeout(()=>location.reload(),3000);
  }

  updateHUD();
}

// ===== SPELL UNLOCK =====
function unlockSpell(){
  let pool=[
    {name:"Flame Burst",d:20,c:10},
    {name:"Rift Bolt",d:30,c:15}
  ];

  let s=pool[Math.floor(Math.random()*pool.length)];
  if(!player.spells.find(x=>x.name===s.name)){
    player.spells.push(s);
    story("Learned "+s.name);
  }
}

// ===== ACTIONS =====
function renderChoices(arr){
  let c=document.getElementById("choices");
  c.innerHTML="";

  arr.forEach(a=>{
    let b=document.createElement("button");
    b.className="choice";
    b.textContent=a;
    b.onclick=()=>action(a);
    c.appendChild(b);
  });
}

function action(a){
  story("> "+a);

  if(a==="Search"){
    if(Math.random()>0.5){
      player.gold+=5;
      story("You found gold!");
    } else story("Nothing found.");
  }

  if(a==="Rest"){
    player.life=Math.min(player.maxLife,player.life+15);
    player.will=Math.min(player.maxWill,player.will+15);
    story("You recover.");
  }

  updateHUD();
}

// ===== MUSIC =====
function playMusic(){
  if(music) return;

  music=new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_d1718d84bb.mp3");
  music.loop=true;
  music.volume=0.4;
  music.play().catch(()=>{});
}

// ===== START =====
intro();
updateHUD();

</script>

</body>
</html>
