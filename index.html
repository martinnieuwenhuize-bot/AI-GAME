<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realm of Ash</title>

<style>
body{margin:0;background:#0c0906;color:#e8dcc8;font-family:serif;}
#app{max-width:500px;margin:auto;height:100vh;display:flex;flex-direction:column;}
#title,#game{padding:20px;flex:1;display:flex;flex-direction:column;}
#game{display:none;}
#story{flex:1;overflow-y:auto;}
input,button{padding:10px;margin-top:5px;}
img{width:100%;border-radius:6px;margin-bottom:10px;}
</style>
</head>

<body>

<div id="app">

<div id="title">
<h1>Realm of Ash</h1>

<input id="name" placeholder="Name">
<input id="appearance" placeholder="Describe yourself">
<select id="class">
<option>Fighter</option>
<option>Mage</option>
<option>Rogue</option>
<option>Cleric</option>
</select>

<button onclick="start()">Begin</button>
</div>

<div id="game">
<img id="img">
<div id="story"></div>

<input id="input" placeholder="Type anything..." onkeydown="if(event.key==='Enter')act()">
<button onclick="act()">Do</button>

<div id="stats"></div>
</div>

</div>

<script>

// ---------- PLAYER ----------
let player={
name:"",
class:"",
location:"town",
hp:100,
xp:0,
rep:0
};

// ---------- GLOBAL WORLD STATE ----------
let worldState={
events:[],
deadNPCs:[],
townState:"normal" // normal, fearful, hostile, friendly
};

// ---------- LOCATIONS ----------
let locations={
town:{desc:"a small frontier town",npc:"borin",exits:["forest"]},
forest:{desc:"a dark forest",npc:"hunter",exits:["town"]}
};

// ---------- NPC ----------
let npcs={
borin:{mood:0,alive:true},
hunter:{mood:0,alive:true}
};

let enemy=null;

// ---------- UI ----------
function narrate(t){
let d=document.createElement("div");
d.textContent=t;
story.appendChild(d);
story.scrollTop=story.scrollHeight;
}

function showImg(){
img.src=`https://image.pollinations.ai/prompt/${player.location} fantasy`;
}

// ---------- START ----------
function start(){
player.name=name.value||"Hero";
player.class=document.getElementById("class").value;

title.style.display="none";
game.style.display="flex";

showImg();
narrate(`You are ${player.name}, a ${player.class}.`);

updateStats();
}

// ---------- INPUT ----------
function act(){
let text=input.value.toLowerCase();
input.value="";
process(text);
}

// ---------- MAIN ----------
function process(text){

narrate("> "+text);

if(enemy){combat(text); return;}

trackWorldEvents(text);
handleMovement(text);
handleNPC(text);
updateWorldState();

narrate(generateStory(text));

updateStats();
}

// ---------- TRACK EVENTS ----------
function trackWorldEvents(text){

if(text.includes("kill")){
worldState.events.push("violence");
player.rep--;
}

if(text.includes("help")){
worldState.events.push("kindness");
player.rep++;
}

if(text.includes("threat")){
worldState.events.push("threat");
player.rep--;
}

}

// ---------- MOVEMENT ----------
function handleMovement(text){

let exits=locations[player.location].exits||[];
exits.forEach(dest=>{
if(text.includes(dest)){
player.location=dest;
showImg();
narrate(`You travel to ${dest}.`);
}
});

}

// ---------- NPC ----------
function handleNPC(text){

let npcName=locations[player.location].npc;
if(!npcName) return;

let npc=npcs[npcName];

// NPC dead check
if(!npc.alive){
narrate(`${npcName} is gone. Permanently.`);
return;
}

// talking
if(text.includes("talk")){
let reaction=getNPCReaction(npc);
narrate(`${npcName}: ${reaction}`);
}

// attack
if(text.includes("attack")){
startCombat(npcName);
}

// kill
if(text.includes("kill") && enemy){
npc.alive=false;
worldState.deadNPCs.push(npcName);
narrate(`${npcName} is dead. This will be remembered.`);
}

}

// ---------- NPC REACTIONS ----------
function getNPCReaction(npc){

if(player.rep>2) return "People here trust you.";
if(player.rep<-2) return "They seem afraid of you.";

switch(worldState.townState){
case "hostile": return "They glare at you with hostility.";
case "fearful": return "They seem nervous around you.";
case "friendly": return "They greet you warmly.";
}

return "They watch you cautiously.";
}

// ---------- WORLD EVOLUTION ----------
function updateWorldState(){

let evil=worldState.events.filter(e=>e==="violence").length;
let good=worldState.events.filter(e=>e==="kindness").length;

if(evil>3){
worldState.townState="hostile";
locations.town.desc="a hostile town where guards track your movements";
}

else if(evil>1){
worldState.townState="fearful";
locations.town.desc="a nervous town where people whisper about you";
}

if(good>2){
worldState.townState="friendly";
locations.town.desc="a welcoming town where people trust you";
}

}

// ---------- COMBAT ----------
function startCombat(name){
enemy={name:name,hp:30};
narrate(`⚔ ${name} attacks!`);
}

function combat(text){

if(text.includes("attack")){
enemy.hp-=10;
narrate("You strike.");
}

if(text.includes("run")){
enemy=null;
narrate("You escape.");
return;
}

if(enemy.hp<=0){
narrate(`${enemy.name} defeated.`);
enemy=null;
player.xp+=10;
return;
}

player.hp-=5;
narrate(`${enemy.name} hits you.`);
}

// ---------- STORY ----------
function generateStory(text){

let loc=locations[player.location];

let worldHint="";

if(worldState.townState==="hostile"){
worldHint=" Everyone watches you closely.";
}
if(worldState.townState==="fearful"){
worldHint=" People avoid your gaze.";
}
if(worldState.townState==="friendly"){
worldHint=" People greet you warmly.";
}

return `You ${text}. You are in ${loc.desc}.${worldHint}`;
}

// ---------- STATS ----------
function updateStats(){
stats.textContent =
`HP:${player.hp} XP:${player.xp} REP:${player.rep} STATE:${worldState.townState}`;
}

</script>
</body>
</html>
