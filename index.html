<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realm of Milamber</title>

<style>
body {
  margin:0;
  background:#0c0906;
  color:#e8dcc8;
  font-family:serif;
}

#app {
  max-width:600px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
}

#story {
  flex:1;
  overflow-y:auto;
  padding:15px;
}

input,button {
  padding:10px;
  margin-top:5px;
  background:#1a1410;
  color:white;
  border:1px solid #2e2318;
}

.choice {
  display:block;
  width:100%;
  margin-top:5px;
  background:#2a1e10;
}
</style>
</head>

<body>

<div id="app">

<div id="story"></div>

<input id="input" placeholder="Type anything..."
onkeydown="if(event.key==='Enter')act()">
<button onclick="act()">Do</button>

<div id="choices"></div>
<div id="stats"></div>

</div>

<script>

// ================= PLAYER =================
let player = {
  reputation: 0,
  location: "tavern",
  room: "bar"
};

// ================= TIME =================
let time = 0;
let day = 1;
let phases = ["Morning","Day","Evening","Night"];

// ================= WEATHER =================
let weather = "Clear";
let weatherTypes = ["Clear","Rain","Storm"];

// ================= PLAYSTYLE =================
let playstyle = {
  violent:0,
  stealth:0,
  heroic:0
};

// ================= FACTIONS =================
let factions = {
  law:{name:"Guards", opinion:0, allies:["civil"], enemies:["shady"]},
  shady:{name:"Criminals", opinion:0, allies:[], enemies:["law"]},
  civil:{name:"Townfolk", opinion:0, allies:["law"], enemies:[]}
};

// ================= AREAS =================
let areas = {
  tavern:{control:"civil"},
  street:{control:"law"},
  forest:{control:"shady"}
};

// ================= WORLD =================
let world = {
  tavern:{
    bar:{desc:"a crowded tavern bar filled with murmurs and tension", npcs:["borin","guard"]},
    backroom:{desc:"a dim backroom where whispers linger", npcs:["shady"]},
    upstairs:{desc:"a creaking upper hallway, mostly empty", npcs:[]}
  },
  town:{
    street:{desc:"a muddy street outside the tavern", npcs:["guard"]}
  },
  forest:{
    clearing:{desc:"a quiet forest clearing, unnervingly still", npcs:["shady"]}
  }
};

// ================= NPCS =================
let npcs = {
  borin:{name:"Borin", faction:"civil", trust:0, loyalty:0, grudge:0, emotion:"neutral", memory:[]},
  shady:{name:"Unknown Man", faction:"shady", trust:0, loyalty:0, grudge:0, emotion:"paranoid", memory:[]},
  guard:{name:"Guard", faction:"law", trust:0, loyalty:0, grudge:0, emotion:"strict", memory:[]}
};

// ================= EVENTS =================
let worldEvents = [];

// ================= UI =================
function narrate(text){
  let div=document.createElement("div");
  div.textContent=text;
  document.getElementById("story").appendChild(div);
  div.scrollIntoView();
}

function updateStats(){
  document.getElementById("stats").textContent =
  `Day ${day} (${phases[time%4]}) | Weather: ${weather} | Rep: ${player.reputation} | Area Control: ${areas[player.location].control}`;
}

// ================= TIME =================
function advanceTime(){
  time++;
  if(time % 4 === 0) day++;

  if(Math.random()<0.3){
    weather = weatherTypes[Math.floor(Math.random()*3)];
    narrate("The weather shifts to " + weather);
  }

  factionWar();
  allianceShift();
  gossipSystem();
}

// ================= FACTION WAR =================
function factionWar(){
  if(Math.random()<0.3){

    let keys = Object.keys(factions);
    let a = keys[Math.floor(Math.random()*keys.length)];
    let b = keys[Math.floor(Math.random()*keys.length)];

    if(a!==b){
      narrate(`${factions[a].name} clash with ${factions[b].name}.`);

      let zone = Object.keys(areas)[Math.floor(Math.random()*3)];
      areas[zone].control = a;

      narrate(`${factions[a].name} take control of the ${zone}.`);

      recordEvent(`${factions[a].name} seized ${zone}`);
    }
  }
}

// ================= ALLIANCES =================
function allianceShift(){
  if(Math.random()<0.2){
    let keys = Object.keys(factions);
    let a = keys[Math.floor(Math.random()*keys.length)];
    let b = keys[Math.floor(Math.random()*keys.length)];

    if(a!==b){
      factions[a].allies.push(b);
      narrate(`${factions[a].name} form an alliance with ${factions[b].name}.`);
    }
  }
}

// ================= INPUT =================
function act(){
  let inputBox = document.getElementById("input");
  let text = inputBox.value.toLowerCase();
  inputBox.value = "";

  if(!text) return;

  narrate("> " + text);

  advanceTime();
  process(text);
}

// ================= MAIN =================
function process(text){

  if(text.includes("attack")){
    playstyle.violent++;
    player.reputation--;
    factions.law.opinion-=2;
    factions.shady.opinion+=1;

    Object.values(npcs).forEach(n=>{
      n.grudge+=2;
      n.emotion="angry";
    });

    recordEvent("you attacked someone");
  }

  if(text.includes("help")){
    playstyle.heroic++;
    player.reputation++;

    recordEvent("you helped someone");
  }

  if(text.includes("sneak")){
    playstyle.stealth++;
  }

  // movement
  if(text.includes("bar")) {player.location="tavern"; player.room="bar";}
  if(text.includes("backroom")) {player.location="tavern"; player.room="backroom";}
  if(text.includes("upstairs")) {player.location="tavern"; player.room="upstairs";}
  if(text.includes("street")) {player.location="town"; player.room="street";}
  if(text.includes("forest")) {player.location="forest"; player.room="clearing";}

  // talking
  if(text.includes("talk")){
    showDialogueChoices();
  }

  groupReaction(text);

  narrate(cinematicNarration(text));

  updateStats();
}

// ================= EVENT MEMORY =================
function recordEvent(desc){

  let event = {
    desc,
    day,
    time:phases[time%4],
    weather
  };

  worldEvents.push(event);

  Object.values(npcs).forEach(n=>{
    n.memory.push(event);
  });
}

// ================= GROUP REACTION =================
function groupReaction(text){

  let room = world[player.location][player.room];
  let present = room.npcs;

  if(present.length>1){

    let a = npcs[present[0]];
    let b = npcs[present[1]];

    narrate(`${a.name} glances at ${b.name}.`);

    if(text.includes("attack") && a.faction==="law"){
      narrate(`${a.name}: "Stop right there."`);
    }
  }
}

// ================= CINEMATIC =================
function cinematicNarration(text){

  let style = getStyle();

  let toneMap={
    violent:"There’s an edge of danger around you.",
    stealth:"You move with quiet precision.",
    heroic:"You carry a reassuring presence.",
    neutral:""
  };

  let control = areas[player.location].control;

  let areaTone={
    law:"The area feels controlled and watchful.",
    shady:"Danger lingers in the air.",
    civil:"People move with careful neutrality."
  };

  return `${toneMap[style]}
${areaTone[control]}
The space responds subtly to your actions.`;
}

// ================= STYLE =================
function getStyle(){
  let m = Math.max(playstyle.violent, playstyle.stealth, playstyle.heroic);
  if(m===playstyle.violent) return "violent";
  if(m===playstyle.stealth) return "stealth";
  if(m===playstyle.heroic) return "heroic";
  return "neutral";
}

// ================= DIALOGUE =================
function showDialogueChoices(){

  let box = document.getElementById("choices");
  box.innerHTML="";

  ["polite","ask","boast","threat"].forEach(choice=>{
    let btn=document.createElement("button");
    btn.textContent=choice;
    btn.className="choice";
    btn.onclick=()=>handleDialogue(choice);
    box.appendChild(btn);
  });
}

function handleDialogue(choice){

  document.getElementById("choices").innerHTML="";

  let npc = npcs.borin;

  if(choice==="polite"){ npc.trust++; narrate("You speak politely."); }
  if(choice==="threat"){ npc.grudge++; player.reputation--; narrate("You make a threat."); }

  narrate(npc.name + ": " + npcDialogue(npc));
}

// ================= NPC DIALOGUE =================
function npcDialogue(n){

  let lines=[];

  if(n.memory.length){
    let e=n.memory[Math.floor(Math.random()*n.memory.length)];
    lines.push(`I remember when ${e.desc} on day ${e.day}.`);
  }

  if(n.grudge>3) lines.push("I don’t trust you.");
  if(n.trust>2) lines.push("You’ve proven yourself.");

  lines.push("Things are changing.");

  return lines[Math.floor(Math.random()*lines.length)];
}

// ================= GOSSIP =================
function gossipSystem(){

  if(worldEvents.length>1 && Math.random()<0.3){
    let e=worldEvents[Math.floor(Math.random()*worldEvents.length)];
    narrate(`Someone whispers: "${e.desc}..."`);
  }
}

// ================= START =================
narrate("Welcome to the Realm of Milamber.");
updateStats();

</script>
</body>
</html>
