<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rift RPG: Ultimate</title>

<style>
body {
  background:#07090f;
  color:#ddd;
  font-family:serif;
  margin:0;
  padding:10px;
  overflow-x:hidden;
}

h2 {text-align:center;color:#eccc68;}

#hud { border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:10px; }

.bar { height:8px; background:#111; margin:5px 0; border-radius:4px; }
.fill { height:100%; transition:width .4s; border-radius:4px; }

.life { background:#2ed573; }
.will { background:#a55eea; }
.xp { background:#ffa502; }

.choice {
  width:100%;
  padding:12px;
  margin:5px 0;
  background:#121520;
  color:#ccc;
  border:1px solid #333;
  transition:.2s;
}
.choice:active { transform:scale(.97); background:#202840; }

.fade { animation:fade 1s; }
@keyframes fade { from{opacity:0} to{opacity:1} }

.shake { animation:shake .3s; }
@keyframes shake {
  0%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  50%{transform:translateX(5px)}
}

.glow { animation:glow 1s; }
@keyframes glow {
  0%{text-shadow:0 0 0}
  50%{text-shadow:0 0 14px violet}
  100%{text-shadow:none}
}

</style>
</head>

<body>

<h2>⚔ Rift RPG: Ultimate</h2>

<div id="hud"></div>
<div id="story"></div>
<div id="choices"></div>
<div id="map"></div>

<script>

let player = {
  life:100,maxLife:100,
  will:100,maxWill:100,
  xp:0,level:1,
  gold:0,
  location:"Rift Edge",
  spells:[{name:"Spark",d:10,c:5}]
};

let combat=null;

// ===== SAVE/LOAD =====
function save(){ localStorage.setItem("riftX",JSON.stringify(player)); }
function load(){
  let s=localStorage.getItem("riftX");
  if(s) player=JSON.parse(s);
}
load();
setInterval(save,4000);

// ===== HUD =====
function hud(){
  document.getElementById("hud").innerHTML=`
  ❤️ ${player.life}/${player.maxLife}
  <div class="bar"><div class="fill life" style="width:${player.life}%"></div></div>

  ✦ ${player.will}/${player.maxWill}
  <div class="bar"><div class="fill will" style="width:${player.will}%"></div></div>

  ⭐ ${player.xp}/100
  <div class="bar"><div class="fill xp" style="width:${player.xp}%"></div></div>

  🪙 ${player.gold} | Lv ${player.level} | 📍 ${player.location}
  ${combat ? "<br>⚔ "+combat.name+" ("+combat.hp+")" : ""}
  `;
}

// ===== STORY =====
function story(t,cls=""){
  let e=document.createElement("div");
  e.className="fade "+cls;
  e.textContent=t;
  document.getElementById("story").appendChild(e);
  window.scrollTo(0,9999);
}

// ===== INTRO CUTSCENE =====
function intro(){
  story("Darkness...");
  setTimeout(()=>story("A distant hum reaches your mind..."),800);
  setTimeout(()=>story("The Rift has opened."),1600);
  setTimeout(()=>story("And something has stepped through."),2500);
}

// ===== MAP =====
function map(){
  if(combat) return;

  document.getElementById("map").innerHTML=`
  <button class="choice" onclick="travel('Rift Edge')">Rift Edge</button>
  <button class="choice" onclick="travel('War Camp')">War Camp</button>
  <button class="choice" onclick="travel('Ruins')">Ancient Ruins</button>
  `;
}

function travel(loc){
  player.location=loc;
  story("You arrive at "+loc);
  event();
}

// ===== EVENTS =====
function event(){
  if(Math.random()>0.5){
    fight(enemy());
  } else {
    story("Silence. Uneasy silence.");
    choose(["Search","Rest","Wait"]);
  }
}

// ===== ENEMIES =====
function enemy(){
  let e=[
    {name:"Warrior",hp:40,atk:8},
    {name:"Brute",hp:70,atk:10},
    {name:"Mage",hp:30,atk:12}
  ];
  return e[Math.floor(Math.random()*e.length)];
}

// ===== COMBAT =====
function fight(e){
  combat={...e};
  story("⚔ "+e.name+" attacks!");
  combatUI();
  hud();
}

function combatUI(){
  let c=document.getElementById("choices");
  c.innerHTML="";

  player.spells.forEach(s=>{
    let b=btn(s.name,()=>cast(s));
    c.appendChild(b);
  });

  c.appendChild(btn("Attack",attack));
}

function attack(){
  let dmg=Math.floor(Math.random()*10+5);
  if(Math.random()>0.8){
    dmg*=2;
    story("💥 CRITICAL!", "glow");
  }

  combat.hp-=dmg;
  story("You hit "+dmg);
  hitFX();

  check();
}

function cast(s){
  if(player.will<s.c){ story("No will!"); return; }

  player.will-=s.c;
  combat.hp-=s.d;
  story("✨ "+s.name,"glow");

  check();
}

function enemyTurn(){
  player.life-=combat.atk;
  story("Enemy strikes "+combat.atk);
  hitFX();
}

function hitFX(){
  document.body.classList.add("shake");
  setTimeout(()=>document.body.classList.remove("shake"),200);
}

function check(){
  if(combat.hp<=0){
    story("Enemy slain!");

    player.gold+=10;
    player.xp+=25;

    if(player.xp>=100){
      levelUp();
    }

    combat=null;
    choose(["Continue"]);
    map();

  } else {
    enemyTurn();
    combatUI();
  }

  deathCheck();
  hud();
}

// ===== LEVEL =====
function levelUp(){
  player.level++;
  player.xp=0;
  story("🌟 LEVEL UP!");

  unlockSpell();
}

// ===== SPELLS =====
function unlockSpell(){
  let pool=[
    {name:"Flame Burst",d:20,c:10},
    {name:"Rift Bolt",d:30,c:15}
  ];

  let s=pool[Math.floor(Math.random()*pool.length)];
  if(!player.spells.find(x=>x.name===s.name)){
    player.spells.push(s);
    story("🧙 Learned "+s.name);
  }
}

// ===== ACTION =====
function choose(arr){
  let c=document.getElementById("choices");
  c.innerHTML="";
  arr.forEach(x=>c.appendChild(btn(x,()=>act(x))));
}

function act(a){
  story("> "+a);

  if(combat) return;

  if(a==="Search"){
    if(Math.random()>0.5){
      story("You found gold!");
      player.gold+=5;
    } else {
      story("Nothing found.");
    }
  }

  if(a==="Rest"){
    player.life=Math.min(player.maxLife,player.life+15);
    player.will=Math.min(player.maxWill,player.will+15);
    story("You recover.");
  }

  if(a==="Wait"){
    story("Time passes...");
    event();
  }

  hud();
}

// ===== BUTTON =====
function btn(text,fn){
  let b=document.createElement("button");
  b.className="choice";
  b.textContent=text;
  b.onclick=fn;
  return b;
}

// ===== DEATH =====
function deathCheck(){
  if(player.life<=0){
    story("☠ You have fallen...");
    document.getElementById("choices").innerHTML="";
    document.getElementById("map").innerHTML="";

    setTimeout(()=>{
      localStorage.removeItem("riftX");
      location.reload();
    },3000);
  }
}

// ===== START =====
intro();
hud();
map();

</script>

</body>
</html>
