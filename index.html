<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rift RPG</title>

<style>
body{margin:0;background:#07090f;color:#ddd;font-family:serif;}
.hidden{display:none;}
button{
  width:100%;padding:12px;margin:6px 0;
  background:#121520;border:1px solid #333;color:#ddd;
}
#title{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  background:radial-gradient(circle,#1a1330,#07090f);
}
#title h1{
  font-size:42px;color:#e0c7ff;
  text-shadow:0 0 30px #a55eea;
}
#hud{padding:10px;border-bottom:1px solid #333;}
.bar{height:8px;background:#111;margin:4px 0;}
.fill{height:100%;}
.life{background:#2ed573;}
.will{background:#a55eea;}
#story{padding:10px;}
#story div{opacity:0;transition:.4s;}
#story .show{opacity:1;}
#map{padding:10px;}
#inventory{
  position:fixed;inset:0;background:#000d;
  display:none;justify-content:center;align-items:center;
}
.box{background:#111;padding:15px;width:90%;max-width:320px;}
</style>
</head>

<body>

<!-- TITLE -->
<div id="title">
  <h1>RIFT</h1>
  <p>The world breaks. You step forward.</p>
  <button onclick="startGame()">✦ Begin ✦</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div id="hud"></div>
  <div id="story"></div>
  <div id="map"></div>
  <button onclick="toggleInventory()">🎒 Inventory</button>
</div>

<!-- INVENTORY -->
<div id="inventory">
  <div class="box">
    <h3>Inventory</h3>
    <div id="invList"></div>
    <button onclick="toggleInventory()">Close</button>
  </div>
</div>

<script>
// ===== STATE =====
let started = false;
let combat = null;

// ===== PLAYER =====
let player={
  life:100,maxLife:100,
  will:100,maxWill:100,
  gold:30,
  location:"Rift Edge",
  inventory:[],
  gear:{weapon:null,armor:null,relic:null}
};

// ===== UI =====
function story(t){
  let d=document.createElement("div");
  d.textContent=t;
  document.getElementById("story").appendChild(d);
  setTimeout(()=>d.classList.add("show"),10);
}
function hud(){
  document.getElementById("hud").innerHTML=`
  ❤️ ${player.life}/${player.maxLife}
  <div class="bar"><div class="fill life" style="width:${player.life}%"></div></div>
  ✦ ${player.will}/${player.maxWill}
  <div class="bar"><div class="fill will" style="width:${player.will}%"></div></div>
  🪙 ${player.gold} | 📍 ${player.location}
  `;
}

// ===== START =====
function startGame(){
  if(started) return;
  started = true;

  document.getElementById("title").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  story("The Rift yawns open before you.");
  showMap();
  hud();
}

// ===== MAP =====
function showMap(){
  document.getElementById("map").innerHTML=`
    <button onclick="travel('Rift Edge')">Rift Edge</button>
    <button onclick="travel('War Camp')">War Camp</button>
    <button onclick="travel('Ruins')">Ancient Ruins</button>
  `;
}

function travel(loc){
  player.location=loc;
  story("You arrive at "+loc+".");
  if(Math.random()>0.5) startCombat();
  else story("The area is quiet.");
  hud();
}

// ===== COMBAT =====
function startCombat(){
  combat={hp:40,atk:8};
  story("⚔ An enemy attacks!");
  document.getElementById("map").innerHTML=
    `<button onclick="attack()">Attack</button>`;
}

function attack(){
  let dmg=10;
  combat.hp-=dmg;
  story("You deal "+dmg);

  if(combat.hp<=0){
    story("Enemy defeated!");
    player.gold+=10;
    combat=null;
    showMap();
  } else {
    player.life-=combat.atk;
    story("Enemy hits "+combat.atk);
    if(player.life<=0){
      deathScreen();
      return;
    }
  }
  hud();
}

// ===== DEATH (SAFE) =====
function deathScreen(){
  document.getElementById("map").innerHTML="";
  story("☠ You have fallen.");
  story("The Rift closes…");

  let btn=document.createElement("button");
  btn.textContent="Restart";
  btn.onclick=()=>window.location.href=window.location.href;
  document.getElementById("map").appendChild(btn);
}

// ===== INVENTORY =====
function toggleInventory(){
  let i=document.getElementById("inventory");
  i.style.display=i.style.display==="flex"?"none":"flex";
  document.getElementById("invList").innerHTML=
    player.inventory.join("<br>") || "Empty";
}
</script>

</body>
</html>
