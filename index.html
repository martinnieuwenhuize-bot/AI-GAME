<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realm of Milamber</title>

<style>
body{margin:0;background:#0c0906;color:#e8dcc8;font-family:serif;}
#app{max-width:500px;margin:auto;height:100vh;display:flex;flex-direction:column;}
#title,#game{padding:20px;flex:1;display:flex;flex-direction:column;}
#game{display:none;}
#story{flex:1;overflow-y:auto;}
input,button{padding:10px;margin-top:5px;}
img{width:100%;border-radius:6px;margin-bottom:10px;}
</style>

<body>

<div id="app">

<div id="title">
<h1>Realm of Milamber</h1>
<input id="name" placeholder="Name">
<select id="class">
<option>Fighter</option>
<option>Mage</option>
<option>Rogue</option>
<option>Cleric</option>
</select>
<button onclick="start()">Begin</button>
</div>

<div id="game">
<img id="img">
<div id="story"></div>

<input id="input" placeholder="Type anything..." onkeydown="if(event.key==='Enter')act()">
<button onclick="act()">Do</button>

<div id="stats"></div>
</div>

</div>

<script>

// ===== PLAYER =====
let player={
name:"",
class:"",
location:"town",
hp:100,
hunger:100,
thirst:100,
xp:0,
rep:0,
injuries:[],
inventory:["water"]
};

// ===== TIME =====
let time=0;
let phases=["Morning","Day","Evening","Night"];

// ===== WEATHER =====
let weather="Clear";

// ===== WORLD =====
let worldState={
events:[],
townState:"normal"
};

// ===== LOCATIONS =====
let locations={
town:{desc:"a guarded town",npc:"borin",exits:["forest"]},
forest:{desc:"a dense forest",npc:"hunter",exits:["town"]}
};

// ===== NPCS =====
let npcs={
borin:{
alive:true,
affection:0,
trust:0,
jealousy:0,
preferences:{
likes:["help","kind","give"],
dislikes:["threat","attack","steal"]
}
},
hunter:{
alive:true,
affection:0,
trust:0,
jealousy:0,
preferences:{
likes:["attack","strength"],
dislikes:["weak","beg"]
}
}
};

let enemy=null;

// ===== UI =====
function narrate(t){
let d=document.createElement("div");
d.textContent=t;
story.appendChild(d);
story.scrollTop=story.scrollHeight;
}

function showImg(){
img.src=`https://image.pollinations.ai/prompt/${player.location} ${weather} fantasy`;
}

// ===== START =====
function start(){
player.name=name.value||"Hero";
title.style.display="none";
game.style.display="flex";

showImg();
narrate("Your journey begins.");

updateStats();
}

// ===== INPUT =====
function act(){
let text=input.value.toLowerCase();
input.value="";
advanceTime();
process(text);
}

// ===== TIME =====
function advanceTime(){
time++;
decayNeeds();
checkInjuries();
randomEvents();
relationshipEvents();
}

// ===== NEEDS =====
function decayNeeds(){
player.hunger-=5;
player.thirst-=7;

if(player.hunger<=0){
player.hp-=5;
narrate("You are starving...");
}

if(player.thirst<=0){
player.hp-=7;
narrate("You are dehydrated...");
}
}

// ===== INJURY =====
function checkInjuries(){

if(player.injuries.includes("wound") && Math.random()<0.3){
if(!player.injuries.includes("infection")){
player.injuries.push("infection");
narrate("Your wound festers.");
}
}

if(player.injuries.includes("infection")){
player.hp-=3;
}
}

// ===== RANDOM EVENTS =====
function randomEvents(){
if(Math.random()<0.05){
let keys=Object.keys(npcs);
let victim=keys[Math.floor(Math.random()*keys.length)];

if(npcs[victim].alive){
npcs[victim].alive=false;
narrate(`${victim} has died somewhere...`);
}
}
}

// ===== RELATIONSHIPS =====
function updateRelationship(npcName, action){

let npc=npcs[npcName];
let text=action.toLowerCase();

npc.preferences.likes.forEach(word=>{
if(text.includes(word)){
npc.affection+=2;
npc.trust+=1;
}
});

npc.preferences.dislikes.forEach(word=>{
if(text.includes(word)){
npc.affection-=2;
npc.trust-=2;
npc.jealousy+=1;
}
});

if(text.includes("help")){
npc.affection+=2;
npc.trust+=2;
}

if(text.includes("attack")){
npc.affection-=5;
npc.trust-=5;
npc.jealousy+=3;
}

npc.affection=Math.max(-10,Math.min(10,npc.affection));
npc.trust=Math.max(-10,Math.min(10,npc.trust));
npc.jealousy=Math.max(0,npc.jealousy);
}

function relationshipEvents(){
Object.keys(npcs).forEach(name=>{
let npc=npcs[name];
if(npc.jealousy>7 && Math.random()<0.3){
narrate(`${name} suddenly betrays you!`);
startCombat(name);
}
});
}

// ===== MAIN =====
function process(text){

narrate("> "+text);

if(enemy){combat(text);return;}

handleMovement(text);
handleActions(text);
handleNPC(text);

updateWorld();

narrate(generateStory(text));

updateStats();
}

// ===== MOVEMENT =====
function handleMovement(text){
let exits=locations[player.location].exits;
exits.forEach(dest=>{
if(text.includes(dest)){
player.location=dest;
showImg();
narrate(`You travel to ${dest}`);
}
});
}

// ===== ACTIONS =====
function handleActions(text){

if(text.includes("eat")){
player.hunger+=20;
narrate("You eat.");
}

if(text.includes("drink")){
if(player.inventory.includes("water")){
player.thirst+=30;
narrate("You drink.");
}
}

if(text.includes("rest")){
player.hp+=10;
narrate("You rest.");
}
}

// ===== NPC =====
function handleNPC(text){

let npcName=locations[player.location].npc;
if(!npcName) return;

let npc=npcs[npcName];

if(!npc.alive){
narrate(`${npcName} is dead.`);
return;
}

updateRelationship(npcName,text);

if(text.includes("talk")){
narrate(`${npcName}: ${getNPCReaction(npc)}`);
}

if(text.includes("attack")){
startCombat(npcName);
}
}

function getNPCReaction(npc){

if(npc.affection>5 && npc.trust>5){
return "They smile warmly. They trust you.";
}

if(npc.trust>5){
return "They nod. 'I trust you.'";
}

if(npc.jealousy>5){
return "They look at you with resentment.";
}

if(npc.affection<-5){
return "They clearly dislike you.";
}

return "They regard you cautiously.";
}

// ===== WORLD EVOLUTION =====
function updateWorld(){

let evil=worldState.events.filter(e=>e==="violence").length;
let good=worldState.events.filter(e=>e==="kindness").length;

if(evil>3){
worldState.townState="hostile";
locations.town.desc="a hostile town where guards watch you";
}

if(good>3){
worldState.townState="friendly";
locations.town.desc="a welcoming town";
}
}

// ===== COMBAT =====
function startCombat(name){
enemy={name:name,hp:30};
narrate(`⚔ ${name} attacks!`);
}

function combat(text){

if(text.includes("attack")){
enemy.hp-=10;
player.hp-=5;
narrate("You trade blows.");

if(Math.random()<0.3){
player.injuries.push("wound");
narrate("You are wounded.");
}
}

if(text.includes("run")){
enemy=null;
narrate("You escape.");
return;
}

if(enemy.hp<=0){
narrate(`${enemy.name} defeated.`);
enemy=null;
player.xp+=10;
}
}

// ===== STORY =====
function generateStory(text){

let loc=locations[player.location];

return `You ${text}. It is ${phases[time%4]}. Weather is ${weather}. You are in ${loc.desc}.`;
}

// ===== STATS =====
function updateStats(){
stats.textContent =
`HP:${player.hp} Hunger:${player.hunger} Thirst:${player.thirst}
XP:${player.xp} REP:${player.rep}
Time:${phases[time%4]} Weather:${weather}
Injuries:${player.injuries.join(", ")||"none"}`;
}

</script>

</body>
</html>
